<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>假装喝奶茶 | Fake Boba</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
<style>
/* ===== CSS Variables ===== */
:root {
  --bg: #FFF8F0;
  --brown: #C4956A;
  --black: #2D1B0E;
  --pink: #FF6B8A;
  --green: #8BC34A;
  --purple: #B39DDB;
  --orange: #FFB74D;
  --radius: 16px;
}

/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'ZCOOL KuaiLe', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--black);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
  position: relative;
}
button { font-family: inherit; cursor: pointer; border: none; outline: none; }

/* ===== Scene System ===== */
.scene { display: none; width: 100%; min-height: 100vh; position: relative; }
.scene.active { display: flex; flex-direction: column; align-items: center; }

/* ===== Common Styles ===== */
.brand-title { font-family: 'ZCOOL KuaiLe', cursive; }
.btn-primary {
  background: linear-gradient(135deg, var(--pink), var(--orange));
  color: #fff;
  border: none;
  border-radius: 50px;
  padding: 16px 40px;
  font-size: 1.1rem;
  font-family: inherit;
  box-shadow: 0 4px 20px rgba(255,107,138,0.35);
  transition: transform 0.2s, box-shadow 0.2s;
}
.btn-primary:active { transform: scale(0.96); box-shadow: 0 2px 10px rgba(255,107,138,0.25); }
.btn-primary:disabled { opacity: 0.5; pointer-events: none; }
.btn-outline {
  background: transparent;
  color: var(--brown);
  border: 2px solid var(--brown);
  border-radius: 50px;
  padding: 14px 36px;
  font-size: 1.05rem;
  font-family: inherit;
  transition: transform 0.2s, background 0.2s;
}
.btn-outline:active { transform: scale(0.96); background: rgba(196,149,106,0.08); }
.hidden { display: none !important; }

/* ===== Animations ===== */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 0.6; }
  50% { transform: scale(1.5); opacity: 0; }
}
@keyframes wave {
  0% { transform: translateX(0); }
  50% { transform: translateX(-10px); }
  100% { transform: translateX(0); }
}
@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-60px) scale(0.8); }
}
@keyframes shakeAnim {
  0%, 100% { transform: translateX(0) rotate(0deg); }
  20% { transform: translateX(-8px) rotate(-3deg); }
  40% { transform: translateX(8px) rotate(3deg); }
  60% { transform: translateX(-6px) rotate(-2deg); }
  80% { transform: translateX(6px) rotate(2deg); }
}
@keyframes steamRise {
  0% { opacity: 0; transform: translateY(0) scaleX(1); }
  50% { opacity: 0.6; }
  100% { opacity: 0; transform: translateY(-40px) scaleX(1.5); }
}
@keyframes bubblePop {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  70% { opacity: 1; transform: translateY(-30px) scale(1.1); }
  100% { opacity: 0; transform: translateY(-50px) scale(0.6); }
}

/* ===== NEW ANIMATIONS ===== */
/* Ice cube float */
@keyframes iceFloat {
  0%, 100% { transform: translateY(0); }
  50% { transform: translateY(-2px); }
}

/* Ice cube drop */
@keyframes iceDrop {
  0% { opacity: 0; transform: translateY(-60px) rotate(0deg); }
  60% { opacity: 1; transform: translateY(4px) rotate(15deg); }
  80% { transform: translateY(-2px) rotate(-5deg); }
  100% { opacity: 1; transform: translateY(0) rotate(0deg); }
}

/* Topping bounce-in */
@keyframes bounceIn {
  0% { opacity: 0; transform: translateY(-40px) scale(0.3); }
  50% { opacity: 1; transform: translateY(6px) scale(1.1); }
  70% { transform: translateY(-3px) scale(0.95); }
  100% { opacity: 1; transform: translateY(0) scale(1); }
}

/* Topping spin-in */
@keyframes spinIn {
  0% { opacity: 0; transform: translateY(-50px) rotate(0deg) scale(0.5); }
  70% { opacity: 1; transform: translateY(3px) rotate(360deg) scale(1.05); }
  100% { opacity: 1; transform: translateY(0) rotate(360deg) scale(1); }
}

/* Topping float-in (pudding) */
@keyframes floatIn {
  0% { opacity: 0; transform: translateY(-30px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* Cream layer spread */
@keyframes creamSpread {
  0% { width: 0; opacity: 0; }
  100% { width: 100%; opacity: 1; }
}

/* Topping fun text */
@keyframes toppingTextPop {
  0% { opacity: 0; transform: translateX(-50%) translateY(5px) scale(0.8); }
  20% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
  80% { opacity: 1; transform: translateX(-50%) translateY(0) scale(1); }
  100% { opacity: 0; transform: translateX(-50%) translateY(-10px) scale(0.9); }
}

/* Tea droplet fall */
@keyframes dropletFall {
  0% { opacity: 1; transform: translateY(0); }
  80% { opacity: 1; }
  100% { opacity: 0; transform: translateY(80px); }
}

/* Splash up */
@keyframes splashUp {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  50% { opacity: 0.8; transform: translateY(-20px) scale(0.8); }
  100% { opacity: 0; transform: translateY(-30px) scale(0.4); }
}

/* Cup pour vibration */
@keyframes pourVibrate {
  0% { transform: translateX(-50%) scale(1); }
  25% { transform: translateX(-50%) scale(1.008); }
  50% { transform: translateX(-50%) scale(1); }
  75% { transform: translateX(-50%) scale(1.01); }
  100% { transform: translateX(-50%) scale(1); }
}

/* Shake liquid wobble */
@keyframes liquidWobble {
  0%, 100% { transform: skewX(0deg); }
  25% { transform: skewX(5deg); }
  75% { transform: skewX(-5deg); }
}

/* Shake bubble rise */
@keyframes shakeBubbleRise {
  0% { opacity: 0.8; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-40px) scale(0.3); }
}

/* Making area shake */
@keyframes makingShake {
  0%, 100% { transform: translateX(0); }
  25% { transform: translateX(-3px); }
  75% { transform: translateX(3px); }
}

/* Ding text */
@keyframes dingPop {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0.5); }
  30% { opacity: 1; transform: translate(-50%, -50%) scale(1.1); }
  70% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
  100% { opacity: 0; transform: translate(-50%, -50%) scale(0.9); }
}

/* Vortex spin */
@keyframes vortexSpin {
  0% { opacity: 0.6; transform: translate(-50%, -50%) rotate(0deg) scale(1); }
  100% { opacity: 0; transform: translate(-50%, -50%) rotate(360deg) scale(0.3); }
}

/* Star fly up */
@keyframes starFlyUp {
  0% { opacity: 1; transform: translateY(0) scale(1) rotate(0deg); }
  100% { opacity: 0; transform: translateY(-80px) scale(0.5) rotate(180deg); }
}

/* Warm overlay fade */
@keyframes warmOverlayIn {
  0% { opacity: 0; }
  100% { opacity: 1; }
}

/* Cup tilt */
@keyframes cupTilt {
  0% { transform: translateX(-50%) rotate(0deg); }
  100% { opacity: 1; transform: translateX(-50%) rotate(5deg); }
}

/* Happy face pop */
@keyframes happyFacePop {
  0% { opacity: 0; transform: translate(-50%, -50%) scale(0); }
  50% { opacity: 1; transform: translate(-50%, -50%) scale(1.2); }
  100% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
}

/* Confetti fly */
@keyframes confettiFly {
  0% { opacity: 1; transform: translateY(0) rotate(0deg); }
  100% { opacity: 0; transform: translateY(-120px) translateX(var(--confetti-x, 0px)) rotate(720deg); }
}

/* Background blob float */
@keyframes blobFloat1 {
  0%, 100% { transform: translate(0, 0); }
  33% { transform: translate(20px, -15px); }
  66% { transform: translate(-10px, 10px); }
}
@keyframes blobFloat2 {
  0%, 100% { transform: translate(0, 0); }
  33% { transform: translate(-15px, 20px); }
  66% { transform: translate(10px, -10px); }
}

/* Count number scroll */
@keyframes countPulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.05); }
}

/* ===== Background Blobs ===== */
.bg-blob {
  position: fixed;
  border-radius: 50%;
  filter: blur(60px);
  pointer-events: none;
  z-index: 0;
  opacity: 0.15;
}
.bg-blob-1 {
  width: 200px; height: 200px;
  background: var(--pink);
  top: 10%; left: -30px;
  animation: blobFloat1 12s ease-in-out infinite;
}
.bg-blob-2 {
  width: 180px; height: 180px;
  background: var(--orange);
  top: 50%; right: -40px;
  animation: blobFloat2 15s ease-in-out infinite;
}
.bg-blob-3 {
  width: 150px; height: 150px;
  background: var(--purple);
  bottom: 10%; left: 20%;
  animation: blobFloat1 18s ease-in-out infinite reverse;
}

/* ===== Warm overlay for tasting ===== */
.warm-overlay {
  position: fixed;
  top: 0; left: 0; right: 0; bottom: 0;
  background: rgba(255, 200, 150, 0.08);
  pointer-events: none;
  z-index: 0;
  opacity: 0;
  transition: opacity 1s ease;
}
.warm-overlay.active { opacity: 1; }

/* ===== Ice Cube Styles ===== */
.ice-cube {
  position: absolute;
  background: linear-gradient(135deg, rgba(200,230,255,0.7), rgba(255,255,255,0.85));
  box-shadow: inset 2px 2px 4px rgba(255,255,255,0.9), inset -1px -1px 3px rgba(150,200,255,0.3);
  z-index: 2;
  animation: iceFloat 3s ease-in-out infinite;
}
.ice-cube-1 {
  width: 16px; height: 14px;
  clip-path: polygon(10% 0%, 90% 5%, 100% 85%, 75% 100%, 0% 90%, 5% 15%);
}
.ice-cube-2 {
  width: 14px; height: 12px;
  clip-path: polygon(5% 10%, 85% 0%, 100% 80%, 80% 100%, 10% 95%, 0% 20%);
}
.ice-cube-3 {
  width: 12px; height: 11px;
  clip-path: polygon(15% 0%, 95% 10%, 85% 90%, 60% 100%, 0% 85%, 10% 10%);
}

/* Home page ice cubes */
.home-ice {
  position: absolute;
  z-index: 2;
  animation: iceFloat 3s ease-in-out infinite;
}
.home-ice-1 {
  width: 14px; height: 12px;
  background: linear-gradient(135deg, rgba(200,230,255,0.7), rgba(255,255,255,0.85));
  box-shadow: inset 2px 2px 3px rgba(255,255,255,0.9), inset -1px -1px 2px rgba(150,200,255,0.3);
  clip-path: polygon(10% 0%, 90% 5%, 100% 85%, 75% 100%, 0% 90%, 5% 15%);
  top: 28px; left: 25px;
  animation-delay: 0s;
}
.home-ice-2 {
  width: 12px; height: 10px;
  background: linear-gradient(135deg, rgba(200,230,255,0.65), rgba(255,255,255,0.8));
  box-shadow: inset 1px 1px 3px rgba(255,255,255,0.9), inset -1px -1px 2px rgba(150,200,255,0.3);
  clip-path: polygon(5% 10%, 85% 0%, 100% 80%, 80% 100%, 10% 95%, 0% 20%);
  top: 32px; left: 55px;
  animation-delay: 1.5s;
}

/* ================================================
   SCENE 1: HOME
   ================================================ */
#scene-home {
  background: linear-gradient(180deg, #FFF8F0 0%, #FFE8D6 50%, #FFF0E6 100%);
  justify-content: center;
  padding: 40px 24px;
  text-align: center;
  z-index: 1;
}
.home-content { max-width: 360px; position: relative; z-index: 1; }
.home-cup {
  width: 140px; height: 180px; margin: 0 auto 24px;
  position: relative;
  animation: fadeInUp 0.8s ease-out both;
}
/* CSS Cup */
.cup-body-css {
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100px; height: 150px;
  background: rgba(255,255,255,0.85);
  border: 2.5px solid #DDD0C4;
  border-radius: 8px 8px 20px 20px;
  overflow: hidden;
}
.cup-liquid-home {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 65%;
  background: linear-gradient(180deg, #D4A574, #C4956A);
  border-radius: 0 0 18px 18px;
}
.cup-liquid-home::before {
  content: '';
  position: absolute; top: -6px; left: -10%; width: 120%; height: 12px;
  background: radial-gradient(ellipse, rgba(255,255,255,0.4) 0%, transparent 70%);
  animation: wave 2.5s ease-in-out infinite;
}
.cup-rim {
  position: absolute; top: 28px; left: 50%; transform: translateX(-50%);
  width: 108px; height: 10px;
  background: #E8DDD4;
  border-radius: 5px;
}
.cup-rim::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 5px;
  background: #F0E8E0;
  border-radius: 5px 5px 0 0;
}
.cup-straw-home {
  position: absolute; top: 5px; right: 30px;
  width: 8px; height: 90px;
  background: linear-gradient(180deg, var(--pink), var(--orange));
  border-radius: 4px;
  transform: rotate(-8deg);
  transform-origin: bottom center;
}
/* Bubbles in cup */
.cup-bubble {
  position: absolute; border-radius: 50%;
  background: rgba(255,255,255,0.5);
  animation: bubblePop 3s ease-in-out infinite;
}

.home-title {
  font-size: 2.4rem;
  color: var(--black);
  margin-bottom: 4px;
  animation: fadeInUp 0.8s ease-out 0.15s both;
}
.home-subtitle {
  font-size: 1rem;
  color: var(--brown);
  letter-spacing: 2px;
  margin-bottom: 16px;
  animation: fadeInUp 0.8s ease-out 0.3s both;
}
.emotion-text {
  font-size: 1.05rem;
  color: #8B7355;
  line-height: 1.7;
  margin-bottom: 32px;
  animation: fadeInUp 0.8s ease-out 0.45s both;
}
.cta-group {
  display: flex; flex-direction: column; gap: 14px;
  align-items: center;
  margin-bottom: 28px;
  animation: fadeInUp 0.8s ease-out 0.6s both;
}
.social-proof {
  font-size: 0.85rem;
  color: #B8A090;
  animation: fadeInUp 0.8s ease-out 0.75s both;
}
#drink-count {
  display: inline-block;
  font-weight: bold;
  color: var(--pink);
}

/* ================================================
   SCENE 2: RECIPE
   ================================================ */
#scene-recipe {
  background: var(--bg);
  padding: 0;
  min-height: 100vh;
  z-index: 1;
}
.recipe-header {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 20px;
  width: 100%;
  max-width: 400px;
}
.btn-back {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.04);
  border-radius: 12px;
  font-size: 1.2rem;
  color: var(--black);
  transition: background 0.2s;
}
.btn-back:active { background: rgba(0,0,0,0.08); }
.recipe-header h2 { font-size: 1.3rem; }
.progress-bar {
  width: 100%; max-width: 400px;
  height: 6px; background: #F0E8E0;
  border-radius: 3px; overflow: hidden;
  margin: 0 20px 8px;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--pink), var(--orange));
  border-radius: 3px;
  transition: width 0.4s ease;
}
.step-label {
  width: 100%; max-width: 400px;
  padding: 0 20px;
  font-size: 0.85rem;
  color: #B8A090;
  margin-bottom: 16px;
}

/* Step panels */
.step-panel { display: none; width: 100%; max-width: 400px; padding: 0 20px; flex: 1; }
.step-panel.active { display: block; }

/* Step 1: Cup type */
.cup-options {
  display: flex; gap: 16px; justify-content: center;
  padding: 20px 0;
}
.cup-card {
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  padding: 20px 16px;
  background: #fff;
  border: 2.5px solid #F0E8E0;
  border-radius: var(--radius);
  cursor: pointer;
  transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
  flex: 1; max-width: 110px;
}
.cup-card:active { transform: scale(0.96); }
.cup-card.selected {
  border-color: var(--pink);
  box-shadow: 0 2px 12px rgba(255,107,138,0.2);
}
.cup-card span { font-size: 0.9rem; color: var(--black); }
.cup-card-icon {
  width: 50px; height: 70px;
  background: rgba(255,255,255,0.9);
  border: 2px solid #DDD0C4;
  border-radius: 6px 6px 14px 14px;
  position: relative;
}
.cup-card-icon.fat { width: 60px; height: 60px; border-radius: 8px 8px 16px 16px; }
.cup-card-icon.tall { width: 40px; height: 80px; border-radius: 5px 5px 12px 12px; }
.cup-card-icon::before {
  content: '';
  position: absolute; top: -4px; left: -4px; right: -4px; height: 8px;
  background: #E8DDD4; border-radius: 4px;
}

/* Step 2: Tea */
.tea-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  padding: 10px 0;
}
.tea-item {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 12px;
  background: #fff;
  border: 2.5px solid #F0E8E0;
  border-radius: 12px;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.2s;
}
.tea-item:active { transform: scale(0.97); }
.tea-item.selected { border-color: var(--pink); }
.tea-color {
  width: 28px; height: 28px;
  border-radius: 50%;
  flex-shrink: 0;
}
.tea-item span { font-size: 0.95rem; }

/* Step 3: Toppings */
.topping-pills {
  display: flex; flex-wrap: wrap; gap: 10px;
  padding: 10px 0;
}
.topping-pill {
  padding: 10px 18px;
  background: #fff;
  border: 2.5px solid #F0E8E0;
  border-radius: 50px;
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.2s;
}
.topping-pill:active { transform: scale(0.96); }
.topping-pill.selected {
  background: linear-gradient(135deg, var(--pink), var(--orange));
  color: #fff;
  border-color: transparent;
}
.topping-count {
  text-align: center;
  font-size: 0.8rem;
  color: #B8A090;
  margin-top: 8px;
}

/* Step 4: Sweetness & Ice */
.slider-group { padding: 10px 0; }
.slider-label {
  font-size: 1rem;
  margin-bottom: 10px;
  color: var(--black);
}
.segment-control {
  display: flex; gap: 0;
  background: #F0E8E0;
  border-radius: 12px;
  padding: 4px;
  margin-bottom: 24px;
}
.segment-btn {
  flex: 1;
  padding: 12px 4px;
  background: transparent;
  border: none;
  border-radius: 10px;
  font-size: 0.85rem;
  color: #8B7355;
  font-family: inherit;
  transition: all 0.25s;
}
.segment-btn.active {
  background: #fff;
  color: var(--black);
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

/* Recipe nav */
.recipe-nav {
  display: flex; gap: 12px;
  padding: 20px;
  width: 100%; max-width: 400px;
  margin-top: auto;
}
.recipe-nav button {
  flex: 1;
  padding: 14px;
  border-radius: 50px;
  font-size: 1rem;
  font-family: inherit;
}
.btn-prev {
  background: #F0E8E0;
  color: var(--black);
}
.btn-next {
  background: linear-gradient(135deg, var(--pink), var(--orange));
  color: #fff;
  box-shadow: 0 4px 16px rgba(255,107,138,0.3);
}

/* ================================================
   SCENE 3: MAKING
   ================================================ */
#scene-making {
  background: linear-gradient(180deg, #FFF8F0 0%, #FFE8D6 100%);
  justify-content: center;
  padding: 40px 24px;
  text-align: center;
  z-index: 1;
}
.making-title {
  font-size: 1.4rem;
  margin-bottom: 30px;
  min-height: 2em;
}
.making-area {
  position: relative;
  width: 180px; height: 260px;
  margin: 0 auto 30px;
}
/* Making cup */
.making-cup-body {
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 140px; height: 230px;
  background: rgba(255,255,255,0.85);
  border: 2.5px solid #DDD0C4;
  border-radius: 10px 10px 24px 24px;
  overflow: hidden;
}
.making-cup-body.pouring {
  animation: pourVibrate 0.3s ease-in-out infinite;
}
.making-cup-rim {
  position: absolute; top: 28px; left: 50%; transform: translateX(-50%);
  width: 148px; height: 10px;
  background: #E8DDD4;
  border-radius: 5px;
  z-index: 2;
}
.making-cup-rim::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 5px;
  background: #F0E8E0;
  border-radius: 5px 5px 0 0;
}
.making-liquid {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 0%;
  transition: height 2s ease-in-out;
  border-radius: 0 0 22px 22px;
}
.making-liquid::before {
  content: '';
  position: absolute; top: -5px; left: -5%; width: 110%; height: 10px;
  background: rgba(255,255,255,0.3);
  border-radius: 50%;
  animation: wave 2s ease-in-out infinite;
}
.making-liquid.wobbling {
  animation: liquidWobble 0.3s ease-in-out infinite;
}
.making-straw {
  position: absolute; top: 10px; right: 40px;
  width: 8px; height: 120px;
  background: linear-gradient(180deg, var(--pink), var(--orange));
  border-radius: 4px;
  transform: rotate(-6deg);
  transform-origin: bottom center;
  z-index: 3;
}

/* Topping dots in cup - differentiated */
.making-topping-dot {
  position: absolute;
  opacity: 0;
  z-index: 1;
}
.making-topping-dot.show { opacity: 1; }

/* Topping fun text */
.topping-fun-text {
  position: absolute;
  left: 50%;
  transform: translateX(-50%);
  white-space: nowrap;
  font-size: 0.75rem;
  color: var(--pink);
  font-family: 'ZCOOL KuaiLe', cursive;
  z-index: 10;
  animation: toppingTextPop 1.5s ease-out forwards;
  pointer-events: none;
}

/* Cream layer */
.cream-layer {
  position: absolute;
  top: 0; left: 0;
  height: 12px;
  background: linear-gradient(180deg, rgba(255,253,208,0.95), rgba(255,253,208,0.6));
  border-radius: 0;
  z-index: 2;
  width: 0;
  transition: width 1s ease-out;
}
.cream-layer.spread { width: 100%; }

/* Tea droplets */
.tea-droplet {
  position: absolute;
  border-radius: 50%;
  z-index: 5;
  animation: dropletFall 0.6s ease-in forwards;
  pointer-events: none;
}

/* Splash droplets */
.splash-droplet {
  position: absolute;
  border-radius: 50%;
  z-index: 5;
  animation: splashUp 0.5s ease-out forwards;
  pointer-events: none;
}

/* Tea stream (kept for reference but we use droplets now) */
.tea-stream {
  position: absolute;
  top: 0; left: 50%; transform: translateX(-50%);
  width: 12px; height: 0;
  border-radius: 6px;
  opacity: 0;
  transition: height 0.5s, opacity 0.3s;
  z-index: 4;
}
.tea-stream.show { opacity: 0.7; }

/* Making ice cubes */
.making-ice-container {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 2;
  pointer-events: none;
  overflow: hidden;
}

/* Shake bubble */
.shake-bubble {
  position: absolute;
  border-radius: 50%;
  background: rgba(255,255,255,0.6);
  z-index: 3;
  animation: shakeBubbleRise 0.8s ease-out forwards;
  pointer-events: none;
}

/* Shake UI - circular progress */
.shake-area {
  text-align: center;
}
.btn-shake {
  background: linear-gradient(135deg, var(--pink), var(--orange));
  color: #fff;
  border: none;
  border-radius: 50px;
  padding: 18px 48px;
  font-size: 1.2rem;
  font-family: inherit;
  box-shadow: 0 4px 20px rgba(255,107,138,0.35);
  transition: transform 0.15s;
  position: relative;
  overflow: hidden;
  user-select: none;
  -webkit-user-select: none;
  touch-action: none;
}
.btn-shake:active { transform: scale(0.95); }
.shake-count-text {
  font-size: 0.9rem;
  color: #B8A090;
  margin-top: 12px;
}

/* Circular progress ring */
.shake-progress-ring {
  display: block;
  margin: 16px auto 0;
  transform: rotate(-90deg);
}
.shake-progress-ring-bg {
  fill: none;
  stroke: #F0E8E0;
  stroke-width: 6;
}
.shake-progress-ring-fill {
  fill: none;
  stroke: url(#shakeGradient);
  stroke-width: 6;
  stroke-linecap: round;
  stroke-dasharray: 251.2;
  stroke-dashoffset: 251.2;
  transition: stroke-dashoffset 0.15s ease;
}

/* Old bar progress (hidden) */
.shake-progress-bar {
  width: 200px; height: 8px;
  background: #F0E8E0;
  border-radius: 4px;
  margin: 16px auto 0;
  overflow: hidden;
  display: none;
}
.shake-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--pink), var(--orange));
  border-radius: 4px;
  transition: width 0.2s;
  width: 0%;
}
.shaking .making-cup-body {
  animation: shakeAnim 0.4s ease-in-out;
}
.making-area.shaking {
  animation: makingShake 0.2s ease-in-out infinite;
}

/* Ding text */
.ding-text {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  font-size: 1.3rem;
  color: var(--pink);
  font-family: 'ZCOOL KuaiLe', cursive;
  white-space: nowrap;
  z-index: 20;
  animation: dingPop 1.2s ease-out forwards;
  pointer-events: none;
}

/* ================================================
   SCENE 4: TASTING
   ================================================ */
#scene-tasting {
  background: linear-gradient(180deg, #FFF8F0 0%, #FFE8D6 100%);
  justify-content: center;
  padding: 30px 24px;
  text-align: center;
  z-index: 1;
}
.tasting-header h2 {
  font-size: 1.3rem;
  margin-bottom: 6px;
}
.sip-progress {
  font-size: 0.9rem;
  color: #B8A090;
  margin-bottom: 24px;
}
.tasting-cup-area {
  position: relative;
  width: 160px; height: 230px;
  margin: 0 auto 30px;
}
.tasting-cup-body {
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 130px; height: 210px;
  background: rgba(255,255,255,0.85);
  border: 2.5px solid #DDD0C4;
  border-radius: 10px 10px 22px 22px;
  overflow: hidden;
  transition: transform 0.6s ease;
}
.tasting-cup-body.tilted {
  transform: translateX(-50%) rotate(5deg);
}
.tasting-cup-rim {
  position: absolute; top: 18px; left: 50%; transform: translateX(-50%);
  width: 138px; height: 10px;
  background: #E8DDD4;
  border-radius: 5px;
  z-index: 2;
}
.tasting-cup-rim::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 5px;
  background: #F0E8E0;
  border-radius: 5px 5px 0 0;
}
.tasting-liquid {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 80%;
  transition: height 0.6s ease;
  border-radius: 0 0 20px 20px;
}
.tasting-liquid::before {
  content: '';
  position: absolute; top: -5px; left: -5%; width: 110%; height: 10px;
  background: rgba(255,255,255,0.3);
  border-radius: 50%;
  animation: wave 2.5s ease-in-out infinite;
}
.tasting-straw-el {
  position: absolute; top: 0; right: 35px;
  width: 8px; height: 110px;
  background: linear-gradient(180deg, var(--pink), var(--orange));
  border-radius: 4px;
  transform: rotate(-6deg);
  transform-origin: bottom center;
  z-index: 3;
}

/* Tasting ice container */
.tasting-ice-container {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  z-index: 2;
  pointer-events: none;
  overflow: hidden;
}

/* Steam */
.steam-container {
  position: absolute; top: -5px; left: 50%; transform: translateX(-50%);
  width: 60px; height: 40px;
  z-index: 5;
}
.steam-line {
  position: absolute; bottom: 0;
  width: 8px; height: 20px;
  background: rgba(255,255,255,0.5);
  border-radius: 50%;
  animation: steamRise 2s ease-out infinite;
}
.steam-line:nth-child(1) { left: 10px; animation-delay: 0s; }
.steam-line:nth-child(2) { left: 25px; animation-delay: 0.6s; }
.steam-line:nth-child(3) { left: 40px; animation-delay: 1.2s; }

/* Sip button */
.btn-sip-wrap {
  position: relative;
  display: inline-block;
  margin-bottom: 20px;
}
.sip-pulse-ring {
  position: absolute;
  top: 50%; left: 50%;
  width: 90px; height: 90px;
  margin: -45px 0 0 -45px;
  border: 2px solid var(--pink);
  border-radius: 50%;
  animation: pulse 2s ease-out infinite;
}
.sip-pulse-ring:nth-child(2) { animation-delay: 0.6s; }
.sip-pulse-ring:nth-child(3) { animation-delay: 1.2s; }
.btn-sip {
  width: 80px; height: 80px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--pink), var(--orange));
  color: #fff;
  font-size: 0.95rem;
  font-family: inherit;
  box-shadow: 0 4px 20px rgba(255,107,138,0.4);
  display: flex; align-items: center; justify-content: center;
  position: relative;
  z-index: 2;
  transition: transform 0.15s;
}
.btn-sip:active { transform: scale(0.92); }

/* Sip progress dots */
.sip-dots {
  display: flex; gap: 6px; justify-content: center;
  margin-bottom: 20px;
}
.sip-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  background: #F0E8E0;
  transition: background 0.3s;
}
.sip-dot.filled { background: var(--pink); }

/* Emotion bubble - enhanced */
.emotion-bubble {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: linear-gradient(135deg, #FF9A9E, #FECFEF);
  border-radius: 20px;
  padding: 16px 24px;
  box-shadow: 0 8px 30px rgba(255,107,138,0.2);
  font-size: 1.1rem;
  color: #fff;
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  white-space: nowrap;
}
.emotion-bubble::after {
  content: '';
  position: absolute;
  bottom: -8px;
  left: 50%;
  transform: translateX(-50%);
  width: 0; height: 0;
  border-left: 8px solid transparent;
  border-right: 8px solid transparent;
  border-top: 8px solid #FECFEF;
}
.emotion-bubble.show {
  opacity: 1;
  animation: floatUp 1.5s ease-out forwards;
}

/* Vortex */
.sip-vortex {
  position: absolute;
  width: 24px; height: 24px;
  border: 2px solid rgba(255,255,255,0.5);
  border-radius: 50%;
  border-top-color: transparent;
  z-index: 4;
  animation: vortexSpin 0.8s ease-out forwards;
  pointer-events: none;
}

/* Star/heart fly */
.sip-star {
  position: absolute;
  z-index: 10;
  animation: starFlyUp 1s ease-out forwards;
  pointer-events: none;
  font-size: 14px;
}

/* Happy face */
.happy-face {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  width: 60px; height: 60px;
  z-index: 20;
  animation: happyFacePop 0.6s ease-out forwards;
  pointer-events: none;
}
.happy-face-eye {
  position: absolute;
  width: 8px; height: 10px;
  background: var(--black);
  border-radius: 50%;
  top: 18px;
}
.happy-face-eye.left { left: 14px; }
.happy-face-eye.right { right: 14px; }
.happy-face-mouth {
  position: absolute;
  bottom: 12px;
  left: 50%;
  transform: translateX(-50%);
  width: 24px; height: 12px;
  border: 3px solid var(--black);
  border-top: none;
  border-radius: 0 0 24px 24px;
}
.happy-face-blush {
  position: absolute;
  width: 12px; height: 8px;
  background: rgba(255,107,138,0.4);
  border-radius: 50%;
  top: 30px;
}
.happy-face-blush.left { left: 4px; }
.happy-face-blush.right { right: 4px; }

/* Confetti */
.confetti-piece {
  position: absolute;
  width: 8px; height: 8px;
  z-index: 20;
  animation: confettiFly 1.5s ease-out forwards;
  pointer-events: none;
}

/* ================================================
   SCENE 5: RESULT
   ================================================ */
#scene-result {
  background: linear-gradient(180deg, #FFF8F0 0%, #FFE8D6 100%);
  justify-content: center;
  padding: 30px 24px;
  text-align: center;
  z-index: 1;
}
.result-card {
  width: 345px;
  max-width: 100%;
  background: linear-gradient(180deg, #FFF8F0, #FFF0E6);
  background-image:
    radial-gradient(circle, rgba(196,149,106,0.06) 1px, transparent 1px);
  background-size: 16px 16px;
  border-radius: 24px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.08);
  overflow: hidden;
  padding: 32px 24px 24px;
}
.result-card-header h3 {
  font-size: 1.5rem;
  color: var(--black);
}
.result-card-header p {
  font-size: 0.85rem;
  color: var(--brown);
  letter-spacing: 1px;
  margin-bottom: 20px;
}
.result-card-body { margin-bottom: 24px; }
.result-subtitle {
  font-size: 0.85rem;
  color: #999;
  margin-bottom: 12px;
}

/* Mini cup in result */
.result-cup-mini {
  width: 40px; height: 60px;
  margin: 0 auto 12px;
  position: relative;
}
.result-cup-mini-body {
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 32px; height: 48px;
  background: rgba(255,255,255,0.85);
  border: 2px solid #DDD0C4;
  border-radius: 4px 4px 12px 12px;
  overflow: hidden;
}
.result-cup-mini-liquid {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 65%;
  border-radius: 0 0 10px 10px;
}
.result-cup-mini-rim {
  position: absolute; top: 10px; left: 50%; transform: translateX(-50%);
  width: 36px; height: 6px;
  background: #E8DDD4;
  border-radius: 3px;
  z-index: 2;
}
.result-cup-mini-straw {
  position: absolute; top: 2px; right: 8px;
  width: 5px; height: 30px;
  background: linear-gradient(180deg, var(--pink), var(--orange));
  border-radius: 3px;
  transform: rotate(-6deg);
  transform-origin: bottom center;
  z-index: 3;
}

.result-recipe-name {
  font-size: 1.3rem;
  color: var(--black);
  margin-bottom: 16px;
}
.result-details {
  display: flex; flex-wrap: wrap; gap: 8px;
  justify-content: center;
  margin-bottom: 16px;
}
.result-tag {
  padding: 6px 14px;
  background: #FFF8F0;
  border-radius: 50px;
  font-size: 0.8rem;
  color: var(--brown);
}
.result-message {
  font-size: 1rem;
  color: #8B7355;
  line-height: 1.6;
  margin-bottom: 20px;
  padding: 0 8px;
}

/* Mood tag */
.result-mood {
  display: inline-block;
  padding: 6px 16px;
  background: linear-gradient(135deg, rgba(255,107,138,0.1), rgba(255,183,77,0.1));
  border-radius: 50px;
  font-size: 0.85rem;
  color: var(--pink);
  margin-bottom: 16px;
}

.result-calories {
  font-size: 1.6rem;
  color: var(--green);
  margin-bottom: 8px;
}
.result-calories .unit {
  font-size: 0.85rem;
}
.result-actions {
  display: flex; gap: 10px;
}
.result-actions button {
  flex: 1;
  padding: 14px 8px;
  border-radius: 50px;
  font-size: 0.9rem;
  font-family: inherit;
  transition: transform 0.15s;
}
.result-actions button:active { transform: scale(0.96); }
.btn-save {
  background: linear-gradient(135deg, var(--pink), var(--orange));
  color: #fff;
  box-shadow: 0 4px 16px rgba(255,107,138,0.3);
}
.btn-retry {
  background: #F0E8E0;
  color: var(--black);
}

/* ===== prefers-reduced-motion ===== */
@media (prefers-reduced-motion: reduce) {
  *, *::before, *::after {
    animation-duration: 0.01ms !important;
    animation-iteration-count: 1 !important;
    transition-duration: 0.01ms !important;
  }
}
</style>
</head>

/* ===== SCENE SWITCHING ===== */
function goToScene(name) {
  var scenes = document.querySelectorAll('.scene');
  for (var i = 0; i < scenes.length; i++) {
    scenes[i].classList.remove('active');
  }
  var target = document.getElementById('scene-' + name);
  if (target) {
    target.classList.add('active');
  }
  window.scrollTo(0, 0);

  if (name === 'making') startMaking();
  if (name === 'tasting') initTasting();
  if (name === 'result') renderResult();

/* ===== HOME ===== */
function randomRecipe() {

  state.teaColor = preset.color;

/* ===== Count animation for social proof ===== */
function animateCount(el, target, duration) {
  var start = 0;
  var startTime = null;
  function step(timestamp) {
    if (!startTime) startTime = timestamp;
    var progress = Math.min((timestamp - startTime) / duration, 1);
    var eased = 1 - Math.pow(1 - progress, 3);
    var current = Math.floor(eased * target);
    el.textContent = current.toLocaleString();
    if (progress < 1) {
      requestAnimationFrame(step);
    } else {
      el.textContent = target.toLocaleString();
    }
  }
  requestAnimationFrame(step);
}

/* ===== RECIPE ===== */
function initRecipe() {
  recipeStep = 0;
  state.cup = '';
  state.tea = '';
  state.teaColor = '#C4956A';
  state.toppings = [];
  state.sweet = '';
  state.ice = '';
  state.iceLevel = '';
  state.iceCount = 0;
  updateRecipeUI();
  buildTeaGrid();
  buildToppingPills();
  buildSegmentControls();
}

function updateRecipeUI() {
  var pct = ((recipeStep + 1) / 4) * 100;
  document.getElementById('recipe-progress').style.width = pct + '%';

  var labels = ['选杯型', '选茶底', '选小料', '甜度 & 冰度'];
  document.getElementById('step-label').textContent = '第 ' + (recipeStep + 1) + ' 步 / 共 4 步 · ' + labels[recipeStep];

  for (var i = 0; i < 4; i++) {
    var panel = document.getElementById('step-' + i);
    if (i === recipeStep) {
      panel.classList.add('active');
    } else {
      panel.classList.remove('active');
    }
  }

  var btnPrev = document.getElementById('btn-prev');
  if (recipeStep === 0) {
    btnPrev.classList.add('hidden');
  } else {
    btnPrev.classList.remove('hidden');
  }

  var btnNext = document.getElementById('btn-next');
  btnNext.disabled = !isStepValid(recipeStep);
  if (recipeStep === 3) {
    btnNext.textContent = '开始制作！';
  } else {
    btnNext.textContent = '下一步';
  }
}

function isStepValid(step) {
  if (step === 0) return state.cup !== '';
  if (step === 1) return state.tea !== '';
  if (step === 2) return state.toppings.length > 0;
  if (step === 3) return state.sweet !== '' && state.ice !== '';
  return false;
}

function selectCup(el, type) {
  var cards = document.querySelectorAll('.cup-card');
  for (var i = 0; i < cards.length; i++) cards[i].classList.remove('selected');
  el.classList.add('selected');
  state.cup = type;
  document.getElementById('btn-next').disabled = false;
}

function buildTeaGrid() {
  var grid = document.getElementById('tea-grid');
  grid.innerHTML = '';
  for (var i = 0; i < TEA_OPTIONS.length; i++) {
    var t = TEA_OPTIONS[i];
    var div = document.createElement('div');
    div.className = 'tea-item';
    div.setAttribute('data-tea', t.name);
    div.innerHTML = '<div class="tea-color" style="background:' + t.color + '"></div><span>' + t.name + '</span>';
    div.onclick = (function(name, color, element) {
      return function() { selectTea(name, color, element); };
    })(t.name, t.color, div);
    grid.appendChild(div);
  }
}

function selectTea(name, color, el) {
  var items = document.querySelectorAll('.tea-item');
  for (var i = 0; i < items.length; i++) items[i].classList.remove('selected');
  el.classList.add('selected');
  state.tea = name;
  state.teaColor = color;
  document.getElementById('btn-next').disabled = false;
}

function buildToppingPills() {
  var container = document.getElementById('topping-pills');
  container.innerHTML = '';
  for (var i = 0; i < TOPPING_OPTIONS.length; i++) {
    var name = TOPPING_OPTIONS[i];
    var pill = document.createElement('div');
    pill.className = 'topping-pill';
    pill.textContent = name;
    pill.setAttribute('data-topping', name);
    pill.onclick = (function(n, element) {
      return function() { toggleTopping(n, element); };
    })(name, pill);
    container.appendChild(pill);
  }
}

function toggleTopping(name, el) {
  var idx = state.toppings.indexOf(name);
  if (idx >= 0) {
    state.toppings.splice(idx, 1);
    el.classList.remove('selected');
  } else {
    if (state.toppings.length >= 3) return;
    state.toppings.push(name);
    el.classList.add('selected');
  }
  document.getElementById('topping-count').textContent = '已选 ' + state.toppings.length + '/3 个小料';
  document.getElementById('btn-next').disabled = state.toppings.length === 0;
}

function buildSegmentControls() {
  buildSegment('sweetness-control', SWEET_OPTIONS, function(val) {
    state.sweet = val;
    document.getElementById('btn-next').disabled = !(state.sweet && state.ice);
  });
  buildSegment('ice-control', ICE_OPTIONS, function(val) {
    state.ice = val;
    state.iceLevel = val;
    state.iceCount = ICE_COUNT_MAP[val] || 0;
    document.getElementById('btn-next').disabled = !(state.sweet && state.ice);
  });
}

function buildSegment(containerId, options, callback) {
  var container = document.getElementById(containerId);
  container.innerHTML = '';
  for (var i = 0; i < options.length; i++) {
    var btn = document.createElement('button');
    btn.className = 'segment-btn';
    btn.textContent = options[i];
    btn.onclick = (function(val, element) {
      return function() {
        var siblings = element.parentElement.querySelectorAll('.segment-btn');
        for (var j = 0; j < siblings.length; j++) siblings[j].classList.remove('active');
        element.classList.add('active');
        callback(val);
      };
    })(options[i], btn);
    container.appendChild(btn);
  }
}

function nextStep() {
  if (!isStepValid(recipeStep)) return;
  if (recipeStep < 3) {
    recipeStep++;
    updateRecipeUI();
  } else {
    buildCustomRecipe();
    goToScene('making');
  }
}

function prevStep() {
  if (recipeStep > 0) {
    recipeStep--;
    updateRecipeUI();
  }
}

function buildCustomRecipe() {
  var teaName = state.tea;
  var toppingStr = state.toppings.length > 0 ? state.toppings[0] : '';
  state.recipeName = teaName + (toppingStr ? toppingStr : '奶茶');
  state.liquidColor = state.teaColor;
  state.iceLevel = state.ice;
  state.iceCount = ICE_COUNT_MAP[state.ice] || 0;
  state.recipeCal = 300 + state.toppings.length * 60;
  if (state.sweet === '全糖') state.recipeCal += 80;
  if (state.sweet === '七分甜') state.recipeCal += 50;
  if (state.sweet === '五分甜') state.recipeCal += 30;
  state.sipCount = 0;
  state.shakeCount = 0;
  state.shakeProgress = 0;
}

/* ===== MAKING ===== */
function startMaking() {
  // Reset making UI
  document.getElementById('making-title').textContent = '正在制作中...';
  document.getElementById('shake-area').classList.add('hidden');
  document.getElementById('tea-stream').classList.remove('show');
  document.getElementById('tea-stream').style.height = '0px';
  document.getElementById('making-area').classList.remove('shaking');

  var liquid = document.getElementById('making-liquid');
  liquid.style.height = '0%';
  liquid.style.background = state.liquidColor;
  liquid.classList.remove('wobbling');

  // Clear toppings
  document.getElementById('making-toppings-container').innerHTML = '';
  // Clear ice
  document.getElementById('making-ice-container').innerHTML = '';

  // Reset shake
  state.shakeProgress = 0;
  state.isShaking = false;
  updateShakeRing();

  // Phase 1: Pour tea with droplets (2s)
  document.getElementById('making-title').textContent = '倒茶中...';

  // Cup vibration during pour
  var cupBody = document.getElementById('making-cup-body');
  cupBody.classList.add('pouring');

  // Create tea droplets
  setTimeout(function() {
    createTeaDroplets();
  }, 300);

  // Liquid rises
  setTimeout(function() {
    liquid.style.height = '70%';
  }, 500);

  // Splash when liquid starts rising
  setTimeout(function() {
    createSplashDroplets();
  }, 800);

  setTimeout(function() {
    cupBody.classList.remove('pouring');
  }, 2200);

  // Phase 2: Add ice cubes (after pour, before toppings)
  var iceDelay = 2500;
  if (state.iceCount > 0) {
    setTimeout(function() {
      document.getElementById('making-title').textContent = '加冰块...';
      addMakingIce();
    }, iceDelay);
    iceDelay += 800;
  }

  // Phase 3: Add toppings (1s each)
  for (var i = 0; i < state.toppings.length; i++) {
    (function(index) {
      setTimeout(function() {
        document.getElementById('making-title').textContent = '加' + state.toppings[index] + '...';
        addMakingTopping(index);
      }, iceDelay + index * 1200);
    })(i);
  }

  // Phase 4: Shake
  var shakeDelay = iceDelay + state.toppings.length * 1200 + 500;
  setTimeout(function() {
    document.getElementById('making-title').textContent = '摇一摇！';
    document.getElementById('shake-area').classList.remove('hidden');
    state.shakeProgress = 0;
    updateShakeRing();
    initShakeButton();
  }, shakeDelay);
}

/* ===== Tea Droplets (pouring effect) ===== */
function createTeaDroplets() {
  var area = document.getElementById('making-area');
  var cupBody = document.getElementById('making-cup-body');
  var streamColor = state.liquidColor;
  var dropletCount = 6 + Math.floor(Math.random() * 3); // 6-8

  for (var i = 0; i < dropletCount; i++) {
    (function(idx) {
      setTimeout(function() {
        var droplet = document.createElement('div');
        droplet.className = 'tea-droplet';
        var size = 4 + Math.floor(Math.random() * 5); // 4-8px
        droplet.style.width = size + 'px';
        droplet.style.height = size + 'px';
        droplet.style.background = streamColor;
        // Random horizontal position within cup mouth
        var leftOffset = 60 + Math.floor(Math.random() * 60); // 60-120px area
        droplet.style.left = leftOffset + 'px';
        droplet.style.top = '20px';
        droplet.style.animationDelay = (Math.random() * 0.3) + 's';
        area.appendChild(droplet);
        // Remove after animation
        setTimeout(function() {
          if (droplet.parentNode) droplet.parentNode.removeChild(droplet);
        }, 1000);
      }, idx * 100);
    })(i);
  }
}

/* ===== Splash Droplets ===== */
function createSplashDroplets() {
  var area = document.getElementById('making-area');
  var liquidEl = document.getElementById('making-liquid');
  var streamColor = state.liquidColor;
  var splashCount = 2 + Math.floor(Math.random() * 2); // 2-3

  for (var i = 0; i < splashCount; i++) {
    (function(idx) {
      setTimeout(function() {
        var splash = document.createElement('div');
        splash.className = 'splash-droplet';
        var size = 3 + Math.floor(Math.random() * 3);
        splash.style.width = size + 'px';
        splash.style.height = size + 'px';
        splash.style.background = streamColor;
        // Position near liquid surface
        var leftOffset = 65 + Math.floor(Math.random() * 50);
        splash.style.left = leftOffset + 'px';
        splash.style.top = '70px'; // approximate liquid surface
        area.appendChild(splash);
        setTimeout(function() {
          if (splash.parentNode) splash.parentNode.removeChild(splash);
        }, 600);
      }, idx * 80);
    })(i);
  }
}

/* ===== Ice Cubes ===== */
function addMakingIce() {
  var container = document.getElementById('making-ice-container');
  var count = state.iceCount;
  var iceClasses = ['ice-cube-1', 'ice-cube-2', 'ice-cube-3'];

  for (var i = 0; i < count; i++) {
    (function(idx) {
      setTimeout(function() {
        var ice = document.createElement('div');
        var cls = iceClasses[idx % iceClasses.length];
        ice.className = 'ice-cube ' + cls;
        // Position randomly in upper-middle area of cup
        var left = 10 + Math.random() * 75;
        var top = 10 + Math.random() * 50;
        ice.style.left = left + '%';
        ice.style.top = top + '%';
        ice.style.animationDelay = (idx * 0.5) + 's, ' + (idx * 0.7) + 's';
        // Drop animation
        ice.style.opacity = '0';
        ice.style.animation = 'iceDrop 0.5s ease-out forwards, iceFloat 3s ease-in-out ' + (idx * 0.5) + 's infinite';
        container.appendChild(ice);
      }, idx * 200);
    })(i);
  }
}

function addTastingIce() {
  var container = document.getElementById('tasting-ice-container');
  container.innerHTML = '';
  var count = state.iceCount;
  if (count === 0) return;
  var iceClasses = ['ice-cube-1', 'ice-cube-2', 'ice-cube-3'];

  for (var i = 0; i < count; i++) {
    var ice = document.createElement('div');
    var cls = iceClasses[i % iceClasses.length];
    ice.className = 'ice-cube ' + cls;
    var left = 10 + Math.random() * 75;
    var top = 10 + Math.random() * 50;
    ice.style.left = left + '%';
    ice.style.top = top + '%';
    ice.style.animationDelay = (i * 0.5) + 's';
    container.appendChild(ice);
  }
}

/* ===== Differentiated Toppings ===== */
function addMakingTopping(index) {
  var toppingName = state.toppings[index];
  var style = TOPPING_STYLES[toppingName];
  if (!style) return;

  var container = document.getElementById('making-toppings-container');

  // Show fun text
  showToppingFunText(toppingName);

  // Special handling for cream layer
  if (style.shape === 'layer') {
    addCreamLayer(container, style);
    return;
  }

  var dot = document.createElement('div');
  dot.className = 'making-topping-dot';

  // Position randomly in lower part of cup
  var left = 15 + Math.random() * 70;
  var bottom = 5 + Math.random() * 40;
  dot.style.left = left + '%';
  dot.style.bottom = bottom + '%';

  var size = style.size;
  dot.style.width = size + 'px';
  dot.style.height = size + 'px';

  // Apply shape
  if (style.shape === 'circle' || style.shape === 'ellipse') {
    dot.style.borderRadius = '50%';
  } else if (style.shape === 'square') {
    dot.style.borderRadius = '2px';
  } else if (style.shape === 'rect') {
    dot.style.borderRadius = '2px';
  }

  // Apply color / extra styles
  if (style.extra && style.extra.indexOf('background:') === 0) {
    dot.style.cssText += ';' + style.extra;
  } else if (style.extra && style.extra.indexOf('box-shadow') === 0) {
    dot.style.background = style.color;
    dot.style.cssText += ';' + style.extra;
  } else if (style.extra && style.extra.indexOf('transform:') === 0) {
    dot.style.background = style.color;
    dot.style.cssText += ';' + style.extra;
  } else {
    dot.style.background = style.color;
    if (style.extra) dot.style.cssText += ';' + style.extra;
  }

  // Determine animation type
  var animName = 'bounceIn';
  if (toppingName === '椰果' || toppingName === '仙草' || toppingName === '奥利奥碎') {
    animName = 'spinIn';
  } else if (toppingName === '布丁') {
    animName = 'floatIn';
  }

  dot.style.animation = animName + ' 0.6s ease-out forwards';
  container.appendChild(dot);
}

function addCreamLayer(container, style) {
  var cream = document.createElement('div');
  cream.className = 'cream-layer';
  container.appendChild(cream);
  // Trigger spread after append
  setTimeout(function() {
    cream.classList.add('spread');
  }, 50);
}

function showToppingFunText(toppingName) {
  var text = TOPPING_FUN_TEXT[toppingName];
  if (!text) return;
  var area = document.getElementById('making-area');
  var el = document.createElement('div');
  el.className = 'topping-fun-text';
  el.textContent = text;
  el.style.top = '-20px';
  area.appendChild(el);
  setTimeout(function() {
    if (el.parentNode) el.parentNode.removeChild(el);
  }, 1600);
}

/* ===== Shake System (Long Press + DeviceMotion) ===== */
function initShakeButton() {
  var btn = document.getElementById('btn-shake');
  // Remove old listeners by cloning
  var newBtn = btn.cloneNode(true);
  btn.parentNode.replaceChild(newBtn, btn);

  // Long press: mousedown / touchstart
  newBtn.addEventListener('mousedown', startShaking);
  newBtn.addEventListener('touchstart', startShaking, { passive: true });
  window.addEventListener('mouseup', stopShaking);
  window.addEventListener('touchend', stopShaking);
  window.addEventListener('touchcancel', stopShaking);

  // DeviceMotion
  if (window.DeviceMotionEvent) {
    window.addEventListener('devicemotion', handleDeviceMotion);
  }
}

function startShaking() {
  if (state.shakeProgress >= 100) return;
  state.isShaking = true;
  var liquid = document.getElementById('making-liquid');
  liquid.classList.add('wobbling');
  document.getElementById('making-area').classList.add('shaking');

  // Progress increment: ~3% per 100ms = 30% per second = ~3.3s to fill
  state.shakeInterval = setInterval(function() {
    if (!state.isShaking || state.shakeProgress >= 100) return;
    state.shakeProgress += 3;
    if (state.shakeProgress > 100) state.shakeProgress = 100;
    updateShakeRing();

    // Create shake bubbles
    if (Math.random() > 0.5) {
      createShakeBubble();
    }

    if (state.shakeProgress >= 100) {
      onShakeComplete();
    }
  }, 100);
}

function stopShaking() {
  if (!state.isShaking) return;
  state.isShaking = false;
  if (state.shakeInterval) {
    clearInterval(state.shakeInterval);
    state.shakeInterval = null;
  }
  var liquid = document.getElementById('making-liquid');
  liquid.classList.remove('wobbling');
  document.getElementById('making-area').classList.remove('shaking');
}

function handleDeviceMotion(e) {
  if (state.shakeProgress >= 100) return;
  var acc = e.accelerationIncludingGravity;
  if (!acc) return;
  var force = Math.abs(acc.x) + Math.abs(acc.y) + Math.abs(acc.z);
  if (force > 30) {
    // Phone shake detected
    state.shakeProgress += 2;
    if (state.shakeProgress > 100) state.shakeProgress = 100;
    updateShakeRing();

    // Brief visual feedback
    var liquid = document.getElementById('making-liquid');
    liquid.classList.add('wobbling');
    document.getElementById('making-area').classList.add('shaking');
    setTimeout(function() {
      liquid.classList.remove('wobbling');
      document.getElementById('making-area').classList.remove('shaking');
    }, 200);

    if (state.shakeProgress >= 100) {
      onShakeComplete();
    }
  }
}

function createShakeBubble() {
  var liquid = document.getElementById('making-liquid');
  var bubble = document.createElement('div');
  bubble.className = 'shake-bubble';
  var size = 3 + Math.floor(Math.random() * 4);
  bubble.style.width = size + 'px';
  bubble.style.height = size + 'px';
  bubble.style.left = (15 + Math.random() * 70) + '%';
  bubble.style.bottom = (30 + Math.random() * 30) + '%';
  liquid.appendChild(bubble);
  setTimeout(function() {
    if (bubble.parentNode) bubble.parentNode.removeChild(bubble);
  }, 900);
}

function updateShakeRing() {
  var ring = document.getElementById('shake-ring-fill');
  if (!ring) return;
  var circumference = 251.2; // 2 * PI * 40
  var offset = circumference - (state.shakeProgress / 100) * circumference;
  ring.style.strokeDashoffset = offset;
  document.getElementById('shake-count-text').textContent = Math.floor(state.shakeProgress) + '%';
}

function onShakeComplete() {
  stopShaking();
  // Show ding text
  var area = document.getElementById('making-area');
  var ding = document.createElement('div');
  ding.className = 'ding-text';
  ding.textContent = '叮～摇好了！';
  area.appendChild(ding);

  setTimeout(function() {
    if (ding.parentNode) ding.parentNode.removeChild(ding);
    document.getElementById('shake-area').classList.add('hidden');
    document.getElementById('making-title').textContent = '完成！';
    setTimeout(function() {
      goToScene('tasting');
    }, 600);
  }, 1300);
}

/* ===== TASTING ===== */
function initTasting() {
  state.sipCount = 0;
  var liquid = document.getElementById('tasting-liquid');
  liquid.style.height = '80%';
  liquid.style.background = state.liquidColor;

  // Reset cup tilt
  document.getElementById('tasting-cup-body').classList.remove('tilted');

  // Remove warm overlay
  document.getElementById('warm-overlay').classList.remove('active');

  // Add ice cubes
  addTastingIce();

  // Build sip dots
  var dotsContainer = document.getElementById('sip-dots');
  dotsContainer.innerHTML = '';
  for (var i = 0; i < 5; i++) {
    var dot = document.createElement('div');
    dot.className = 'sip-dot';
    dot.id = 'sip-dot-' + i;
    dotsContainer.appendChild(dot);
  }

  document.getElementById('sip-progress').textContent = '第 0 / 5 口';
  document.getElementById('btn-sip').classList.remove('hidden');
  document.getElementById('btn-sip-wrap').classList.remove('hidden');
  document.getElementById('btn-result').classList.add('hidden');

  // Clean up any leftover elements
  var area = document.getElementById('tasting-cup-area');
  var leftovers = area.querySelectorAll('.sip-vortex, .sip-star, .happy-face, .confetti-piece');
  for (var j = 0; j < leftovers.length; j++) {
    if (leftovers[j].parentNode) leftovers[j].parentNode.removeChild(leftovers[j]);
  }
}

function takeSip() {
  if (state.sipCount >= 5) return;
  state.sipCount++;

  // Lower liquid
  var liquid = document.getElementById('tasting-liquid');
  var newHeight = 80 - (state.sipCount * 16);
  if (newHeight < 0) newHeight = 0;
  liquid.style.height = newHeight + '%';

  // Update progress
  document.getElementById('sip-progress').textContent = '第 ' + state.sipCount + ' / 5 口';

  // Fill dot
  var dot = document.getElementById('sip-dot-' + (state.sipCount - 1));
  if (dot) dot.classList.add('filled');

  // Create vortex at straw bottom
  createSipVortex();

  // Fly out star or heart
  createSipStar();

  // Show emotion bubble
  showEmotionBubble();

  // 3rd sip: warm overlay
  if (state.sipCount === 3) {
    document.getElementById('warm-overlay').classList.add('active');
  }

  if (state.sipCount >= 5) {
    // Done drinking - special effects
    setTimeout(function() {
      document.getElementById('btn-sip').classList.add('hidden');
      document.getElementById('btn-sip-wrap').classList.add('hidden');
      document.getElementById('btn-result').classList.remove('hidden');

      // Cup tilt
      document.getElementById('tasting-cup-body').classList.add('tilted');

      // Happy face
      showHappyFace();

      // Confetti
      createConfetti();
    }, 1600);
  }
}

function createSipVortex() {
  var area = document.getElementById('tasting-cup-area');
  var vortex = document.createElement('div');
  vortex.className = 'sip-vortex';
  // Position near straw bottom in the liquid
  vortex.style.right = '30px';
  vortex.style.bottom = '60px';
  area.appendChild(vortex);
  setTimeout(function() {
    if (vortex.parentNode) vortex.parentNode.removeChild(vortex);
  }, 900);
}

function createSipStar() {
  var area = document.getElementById('tasting-cup-area');
  var star = document.createElement('div');
  star.className = 'sip-star';
  // Alternate star and heart
  if (state.sipCount % 2 === 0) {
    star.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24" fill="#FF6B8A"><path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/></svg>';
  } else {
    star.innerHTML = '<svg width="14" height="14" viewBox="0 0 24 24" fill="#FF6B8A"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg>';
  }
  // Position at straw top
  star.style.right = '28px';
  star.style.top = '-5px';
  area.appendChild(star);
  setTimeout(function() {
    if (star.parentNode) star.parentNode.removeChild(star);
  }, 1100);
}

function showHappyFace() {
  var area = document.getElementById('tasting-cup-area');
  var face = document.createElement('div');
  face.className = 'happy-face';
  face.innerHTML =
    '<div class="happy-face-eye left"></div>' +
    '<div class="happy-face-eye right"></div>' +
    '<div class="happy-face-mouth"></div>' +
    '<div class="happy-face-blush left"></div>' +
    '<div class="happy-face-blush right"></div>';
  area.appendChild(face);
}

function createConfetti() {
  var area = document.getElementById('tasting-cup-area');
  var colors = ['#FF6B8A', '#FFB74D', '#8BC34A', '#B39DDB', '#FFD54F', '#C4956A', '#FF4081'];
  var count = 10 + Math.floor(Math.random() * 6); // 10-15

  for (var i = 0; i < count; i++) {
    (function(idx) {
      setTimeout(function() {
        var piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.background = colors[Math.floor(Math.random() * colors.length)];
        piece.style.left = (50 + (Math.random() - 0.5) * 80) + 'px';
        piece.style.top = '40px';
        piece.style.setProperty('--confetti-x', ((Math.random() - 0.5) * 100) + 'px');
        piece.style.animationDelay = (Math.random() * 0.3) + 's';
        piece.style.width = (5 + Math.random() * 5) + 'px';
        piece.style.height = (5 + Math.random() * 5) + 'px';
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        area.appendChild(piece);
        setTimeout(function() {
          if (piece.parentNode) piece.parentNode.removeChild(piece);
        }, 2000);
      }, idx * 50);
    })(i);
  }
}

function showEmotionBubble() {
  var bubble = document.getElementById('emotion-bubble');
  var msg = SIP_MESSAGES[Math.floor(Math.random() * SIP_MESSAGES.length)];
  bubble.textContent = msg;
  bubble.classList.remove('show');
  bubble.offsetHeight; // reflow
  bubble.classList.add('show');
  setTimeout(function() {
    bubble.classList.remove('show');
  }, 1500);
}

/* ===== RESULT ===== */
function getPersonalMessage() {
  if (state.sweet === '全糖') return '虽然选了全糖，但假装喝就不算！';
  if (state.sweet === '无糖') return '无糖也快乐，自律的你最棒！';
  if (state.ice === '热饮') return '一杯热腾腾的假装奶茶，温暖你的心';
  if (state.toppings.indexOf('芝士奶盖') >= 0) return '奶盖爱好者，品味不一般！';
  if (state.toppings.length >= 3) return '小料拉满，你是奶茶界的满汉全席！';
  return RESULT_MESSAGES[Math.floor(Math.random() * RESULT_MESSAGES.length)];
}

function getMoodTag() {
  if (state.sweet === '全糖') return '🍬 快乐全糖党';
  if (state.sweet === '无糖') return '🧘 佛系控糖派';
  if (state.toppings.indexOf('珍珠') >= 0) return '⚫ 珍珠狂热粉';
  if (state.toppings.indexOf('芝士奶盖') >= 0) return '🧀 奶盖爱好者';
  if (state.ice === '热饮') return '♨️ 暖心热饮派';
  if (state.toppings.length >= 3) return '🎉 小料满汉全席';
  return '✨ 佛系随缘派';
}

function renderResult() {
  document.getElementById('result-recipe-name').textContent = state.recipeName;

  // Mini cup liquid color
  document.getElementById('result-cup-mini-liquid').style.background = state.liquidColor;

  // Build tags
  var details = document.getElementById('result-details');
  details.innerHTML = '';
  var tags = [state.sweet, state.ice];
  for (var i = 0; i < state.toppings.length; i++) {
    tags.push(state.toppings[i]);
  }
  for (var j = 0; j < tags.length; j++) {
    var tag = document.createElement('span');
    tag.className = 'result-tag';
    tag.textContent = tags[j];
    details.appendChild(tag);
  }

  // Mood tag
  document.getElementById('result-mood').textContent = getMoodTag();

  // Personal message
  document.getElementById('result-message').textContent = getPersonalMessage();

  // Calories
  document.getElementById('result-calories').textContent = state.recipeCal;
}

function saveCard() {
  if (typeof html2canvas === 'undefined') {
    var script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
    script.onload = function() { doSaveCard(); };
    script.onerror = function() { alert('图片库加载失败，请检查网络后重试'); };
    document.head.appendChild(script);
  } else {
    doSaveCard();
  }
}

function doSaveCard() {
  var card = document.getElementById('result-card');
  html2canvas(card, {
    backgroundColor: '#FFFFFF',
    scale: 2,
    useCORS: true
  }).then(function(canvas) {
    var link = document.createElement('a');
    link.download = '假装喝奶茶-' + state.recipeName + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }).catch(function() {
    alert('保存失败，请重试');
  });
}

function resetAll() {
  state.cup = '';
  state.tea = '';
  state.teaColor = '#C4956A';
  state.toppings = [];
  state.sweet = '';
  state.ice = '';
  state.iceLevel = '';
  state.iceCount = 0;
  state.recipeName = '';
  state.recipeCal = 0;
  state.liquidColor = '#C4956A';
  state.sipCount = 0;
  state.shakeCount = 0;
  state.shakeProgress = 0;
  state.isShaking = false;
  if (state.shakeInterval) {
    clearInterval(state.shakeInterval);
    state.shakeInterval = null;
  }
  recipeStep = 0;
  document.getElementById('warm-overlay').classList.remove('active');
  goToScene('home');
}

/* ===== INIT ===== */
// Override goToScene('recipe') to also init recipe
var _origGoToScene = goToScene;
goToScene = function(name) {
  _origGoToScene(name);
  if (name === 'recipe') initRecipe();
};

// Animate drink count on load
(function() {
  var el = document.getElementById('drink-count');
  if (el) {
    var base = 12345;
    var rand = Math.floor(Math.random() * 500);
    var target = base + rand;
    animateCount(el, target, 1500);
  }
})();
</script>
