<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
<title>假装喝奶茶 | Fake Boba</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
<style>
/* ===== CSS Variables ===== */
:root {
  --bg: #FFF8F0;
  --brown: #C4956A;
  --black: #2D1B0E;
  --pink: #FF6B8A;
  --green: #8BC34A;
  --purple: #B39DDB;
  --orange: #FFB74D;
  --radius: 16px;
}

/* ===== Reset & Base ===== */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; -webkit-tap-highlight-color: transparent; }
body {
  font-family: 'ZCOOL KuaiLe', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--black);
  min-height: 100vh;
  overflow-x: hidden;
  -webkit-font-smoothing: antialiased;
}
button { font-family: inherit; cursor: pointer; border: none; outline: none; }

/* ===== Scene System ===== */
.scene { display: none; width: 100%; min-height: 100vh; position: relative; }
.scene.active { display: flex; flex-direction: column; align-items: center; }

/* ===== Common Styles ===== */
.brand-title { font-family: 'ZCOOL KuaiLe', cursive; }
.btn-primary {
  background: linear-gradient(135deg, var(--pink), var(--orange));
  color: #fff;
  border: none;
  border-radius: 50px;
  padding: 16px 40px;
  font-size: 1.1rem;
  font-family: inherit;
  box-shadow: 0 4px 20px rgba(255,107,138,0.35);
  transition: transform 0.2s, box-shadow 0.2s;
}
.btn-primary:active { transform: scale(0.96); box-shadow: 0 2px 10px rgba(255,107,138,0.25); }
.btn-primary:disabled { opacity: 0.5; pointer-events: none; }
.btn-outline {
  background: transparent;
  color: var(--brown);
  border: 2px solid var(--brown);
  border-radius: 50px;
  padding: 14px 36px;
  font-size: 1.05rem;
  font-family: inherit;
  transition: transform 0.2s, background 0.2s;
}
.btn-outline:active { transform: scale(0.96); background: rgba(196,149,106,0.08); }
.hidden { display: none !important; }

/* ===== Animations ===== */
@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(30px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes pulse {
  0%, 100% { transform: scale(1); opacity: 0.6; }
  50% { transform: scale(1.5); opacity: 0; }
}
@keyframes wave {
  0% { transform: translateX(0); }
  50% { transform: translateX(-10px); }
  100% { transform: translateX(0); }
}
@keyframes floatUp {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  100% { opacity: 0; transform: translateY(-60px) scale(0.8); }
}
@keyframes shakeAnim {
  0%, 100% { transform: translateX(0) rotate(0deg); }
  20% { transform: translateX(-8px) rotate(-3deg); }
  40% { transform: translateX(8px) rotate(3deg); }
  60% { transform: translateX(-6px) rotate(-2deg); }
  80% { transform: translateX(6px) rotate(2deg); }
}
@keyframes steamRise {
  0% { opacity: 0; transform: translateY(0) scaleX(1); }
  50% { opacity: 0.6; }
  100% { opacity: 0; transform: translateY(-40px) scaleX(1.5); }
}
@keyframes bubblePop {
  0% { opacity: 1; transform: translateY(0) scale(1); }
  70% { opacity: 1; transform: translateY(-30px) scale(1.1); }
  100% { opacity: 0; transform: translateY(-50px) scale(0.6); }
}

/* ================================================
   SCENE 1: HOME
   ================================================ */
#scene-home {
  background: linear-gradient(180deg, #FFF8F0 0%, #FFE8D6 50%, #FFF0E6 100%);
  justify-content: center;
  padding: 40px 24px;
  text-align: center;
}
.home-content { max-width: 360px; }
.home-cup {
  width: 140px; height: 180px; margin: 0 auto 24px;
  position: relative;
  animation: fadeInUp 0.8s ease-out both;
}
/* CSS Cup */
.cup-body-css {
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100px; height: 150px;
  background: rgba(255,255,255,0.85);
  border: 2.5px solid #DDD0C4;
  border-radius: 8px 8px 20px 20px;
  overflow: hidden;
}
.cup-liquid-home {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 65%;
  background: linear-gradient(180deg, #D4A574, #C4956A);
  border-radius: 0 0 18px 18px;
}
.cup-liquid-home::before {
  content: '';
  position: absolute; top: -6px; left: -10%; width: 120%; height: 12px;
  background: radial-gradient(ellipse, rgba(255,255,255,0.4) 0%, transparent 70%);
  animation: wave 2.5s ease-in-out infinite;
}
.cup-rim {
  position: absolute; top: 28px; left: 50%; transform: translateX(-50%);
  width: 108px; height: 10px;
  background: #E8DDD4;
  border-radius: 5px;
}
.cup-rim::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 5px;
  background: #F0E8E0;
  border-radius: 5px 5px 0 0;
}
.cup-straw-home {
  position: absolute; top: 5px; right: 30px;
  width: 8px; height: 90px;
  background: linear-gradient(180deg, var(--pink), var(--orange));
  border-radius: 4px;
  transform: rotate(-8deg);
  transform-origin: bottom center;
}
/* Bubbles in cup */
.cup-bubble {
  position: absolute; border-radius: 50%;
  background: rgba(255,255,255,0.5);
  animation: bubblePop 3s ease-in-out infinite;
}

.home-title {
  font-size: 2.4rem;
  color: var(--black);
  margin-bottom: 4px;
  animation: fadeInUp 0.8s ease-out 0.15s both;
}
.home-subtitle {
  font-size: 1rem;
  color: var(--brown);
  letter-spacing: 2px;
  margin-bottom: 16px;
  animation: fadeInUp 0.8s ease-out 0.3s both;
}
.emotion-text {
  font-size: 1.05rem;
  color: #8B7355;
  line-height: 1.7;
  margin-bottom: 32px;
  animation: fadeInUp 0.8s ease-out 0.45s both;
}
.cta-group {
  display: flex; flex-direction: column; gap: 14px;
  align-items: center;
  margin-bottom: 28px;
  animation: fadeInUp 0.8s ease-out 0.6s both;
}
.social-proof {
  font-size: 0.85rem;
  color: #B8A090;
  animation: fadeInUp 0.8s ease-out 0.75s both;
}

/* ================================================
   SCENE 2: RECIPE
   ================================================ */
#scene-recipe {
  background: var(--bg);
  padding: 0;
  min-height: 100vh;
}
.recipe-header {
  display: flex; align-items: center; gap: 12px;
  padding: 16px 20px;
  width: 100%;
  max-width: 400px;
}
.btn-back {
  width: 40px; height: 40px;
  display: flex; align-items: center; justify-content: center;
  background: rgba(0,0,0,0.04);
  border-radius: 12px;
  font-size: 1.2rem;
  color: var(--black);
  transition: background 0.2s;
}
.btn-back:active { background: rgba(0,0,0,0.08); }
.recipe-header h2 { font-size: 1.3rem; }
.progress-bar {
  width: 100%; max-width: 400px;
  height: 6px; background: #F0E8E0;
  border-radius: 3px; overflow: hidden;
  margin: 0 20px 8px;
}
.progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--pink), var(--orange));
  border-radius: 3px;
  transition: width 0.4s ease;
}
.step-label {
  width: 100%; max-width: 400px;
  padding: 0 20px;
  font-size: 0.85rem;
  color: #B8A090;
  margin-bottom: 16px;
}

/* Step panels */
.step-panel { display: none; width: 100%; max-width: 400px; padding: 0 20px; flex: 1; }
.step-panel.active { display: block; }

/* Step 1: Cup type */
.cup-options {
  display: flex; gap: 16px; justify-content: center;
  padding: 20px 0;
}
.cup-card {
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  padding: 20px 16px;
  background: #fff;
  border: 2.5px solid #F0E8E0;
  border-radius: var(--radius);
  cursor: pointer;
  transition: border-color 0.2s, transform 0.2s, box-shadow 0.2s;
  flex: 1; max-width: 110px;
}
.cup-card:active { transform: scale(0.96); }
.cup-card.selected {
  border-color: var(--pink);
  box-shadow: 0 2px 12px rgba(255,107,138,0.2);
}
.cup-card span { font-size: 0.9rem; color: var(--black); }
.cup-card-icon {
  width: 50px; height: 70px;
  background: rgba(255,255,255,0.9);
  border: 2px solid #DDD0C4;
  border-radius: 6px 6px 14px 14px;
  position: relative;
}
.cup-card-icon.fat { width: 60px; height: 60px; border-radius: 8px 8px 16px 16px; }
.cup-card-icon.tall { width: 40px; height: 80px; border-radius: 5px 5px 12px 12px; }
.cup-card-icon::before {
  content: '';
  position: absolute; top: -4px; left: -4px; right: -4px; height: 8px;
  background: #E8DDD4; border-radius: 4px;
}

/* Step 2: Tea */
.tea-grid {
  display: grid; grid-template-columns: 1fr 1fr; gap: 12px;
  padding: 10px 0;
}
.tea-item {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 12px;
  background: #fff;
  border: 2.5px solid #F0E8E0;
  border-radius: 12px;
  cursor: pointer;
  transition: border-color 0.2s, transform 0.2s;
}
.tea-item:active { transform: scale(0.97); }
.tea-item.selected { border-color: var(--pink); }
.tea-color {
  width: 28px; height: 28px;
  border-radius: 50%;
  flex-shrink: 0;
}
.tea-item span { font-size: 0.95rem; }

/* Step 3: Toppings */
.topping-pills {
  display: flex; flex-wrap: wrap; gap: 10px;
  padding: 10px 0;
}
.topping-pill {
  padding: 10px 18px;
  background: #fff;
  border: 2.5px solid #F0E8E0;
  border-radius: 50px;
  font-size: 0.9rem;
  cursor: pointer;
  transition: all 0.2s;
}
.topping-pill:active { transform: scale(0.96); }
.topping-pill.selected {
  background: linear-gradient(135deg, var(--pink), var(--orange));
  color: #fff;
  border-color: transparent;
}
.topping-count {
  text-align: center;
  font-size: 0.8rem;
  color: #B8A090;
  margin-top: 8px;
}

/* Step 4: Sweetness & Ice */
.slider-group { padding: 10px 0; }
.slider-label {
  font-size: 1rem;
  margin-bottom: 10px;
  color: var(--black);
}
.segment-control {
  display: flex; gap: 0;
  background: #F0E8E0;
  border-radius: 12px;
  padding: 4px;
  margin-bottom: 24px;
}
.segment-btn {
  flex: 1;
  padding: 12px 4px;
  background: transparent;
  border: none;
  border-radius: 10px;
  font-size: 0.85rem;
  color: #8B7355;
  font-family: inherit;
  transition: all 0.25s;
}
.segment-btn.active {
  background: #fff;
  color: var(--black);
  box-shadow: 0 2px 8px rgba(0,0,0,0.08);
}

/* Recipe nav */
.recipe-nav {
  display: flex; gap: 12px;
  padding: 20px;
  width: 100%; max-width: 400px;
  margin-top: auto;
}
.recipe-nav button {
  flex: 1;
  padding: 14px;
  border-radius: 50px;
  font-size: 1rem;
  font-family: inherit;
}
.btn-prev {
  background: #F0E8E0;
  color: var(--black);
}
.btn-next {
  background: linear-gradient(135deg, var(--pink), var(--orange));
  color: #fff;
  box-shadow: 0 4px 16px rgba(255,107,138,0.3);
}

/* ================================================
   SCENE 3: MAKING
   ================================================ */
#scene-making {
  background: linear-gradient(180deg, #FFF8F0 0%, #FFE8D6 100%);
  justify-content: center;
  padding: 40px 24px;
  text-align: center;
}
.making-title {
  font-size: 1.4rem;
  margin-bottom: 30px;
  min-height: 2em;
}
.making-area {
  position: relative;
  width: 180px; height: 260px;
  margin: 0 auto 30px;
}
/* Making cup */
.making-cup-body {
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 140px; height: 230px;
  background: rgba(255,255,255,0.85);
  border: 2.5px solid #DDD0C4;
  border-radius: 10px 10px 24px 24px;
  overflow: hidden;
}
.making-cup-rim {
  position: absolute; top: 28px; left: 50%; transform: translateX(-50%);
  width: 148px; height: 10px;
  background: #E8DDD4;
  border-radius: 5px;
  z-index: 2;
}
.making-cup-rim::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 5px;
  background: #F0E8E0;
  border-radius: 5px 5px 0 0;
}
.making-liquid {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 0%;
  transition: height 2s ease-in-out;
  border-radius: 0 0 22px 22px;
}
.making-liquid::before {
  content: '';
  position: absolute; top: -5px; left: -5%; width: 110%; height: 10px;
  background: rgba(255,255,255,0.3);
  border-radius: 50%;
  animation: wave 2s ease-in-out infinite;
}
.making-straw {
  position: absolute; top: 10px; right: 40px;
  width: 8px; height: 120px;
  background: linear-gradient(180deg, var(--pink), var(--orange));
  border-radius: 4px;
  transform: rotate(-6deg);
  transform-origin: bottom center;
  z-index: 3;
}
/* Topping dots in cup */
.making-topping-dot {
  position: absolute;
  width: 14px; height: 14px;
  border-radius: 50%;
  opacity: 0;
  transition: opacity 0.5s;
  z-index: 1;
}
.making-topping-dot.show { opacity: 1; }

/* Tea stream */
.tea-stream {
  position: absolute;
  top: 0; left: 50%; transform: translateX(-50%);
  width: 12px; height: 0;
  border-radius: 6px;
  opacity: 0;
  transition: height 0.5s, opacity 0.3s;
  z-index: 4;
}
.tea-stream.show { opacity: 0.7; }

/* Shake UI */
.shake-area {
  text-align: center;
}
.btn-shake {
  background: linear-gradient(135deg, var(--pink), var(--orange));
  color: #fff;
  border: none;
  border-radius: 50px;
  padding: 18px 48px;
  font-size: 1.2rem;
  font-family: inherit;
  box-shadow: 0 4px 20px rgba(255,107,138,0.35);
  transition: transform 0.15s;
  position: relative;
  overflow: hidden;
}
.btn-shake:active { transform: scale(0.95); }
.shake-count-text {
  font-size: 0.9rem;
  color: #B8A090;
  margin-top: 12px;
}
.shake-progress-bar {
  width: 200px; height: 8px;
  background: #F0E8E0;
  border-radius: 4px;
  margin: 16px auto 0;
  overflow: hidden;
}
.shake-progress-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--pink), var(--orange));
  border-radius: 4px;
  transition: width 0.2s;
  width: 0%;
}
.shaking .making-cup-body {
  animation: shakeAnim 0.4s ease-in-out;
}

/* ================================================
   SCENE 4: TASTING
   ================================================ */
#scene-tasting {
  background: linear-gradient(180deg, #FFF8F0 0%, #FFE8D6 100%);
  justify-content: center;
  padding: 30px 24px;
  text-align: center;
}
.tasting-header h2 {
  font-size: 1.3rem;
  margin-bottom: 6px;
}
.sip-progress {
  font-size: 0.9rem;
  color: #B8A090;
  margin-bottom: 24px;
}
.tasting-cup-area {
  position: relative;
  width: 160px; height: 230px;
  margin: 0 auto 30px;
}
.tasting-cup-body {
  position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 130px; height: 210px;
  background: rgba(255,255,255,0.85);
  border: 2.5px solid #DDD0C4;
  border-radius: 10px 10px 22px 22px;
  overflow: hidden;
}
.tasting-cup-rim {
  position: absolute; top: 18px; left: 50%; transform: translateX(-50%);
  width: 138px; height: 10px;
  background: #E8DDD4;
  border-radius: 5px;
  z-index: 2;
}
.tasting-cup-rim::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 5px;
  background: #F0E8E0;
  border-radius: 5px 5px 0 0;
}
.tasting-liquid {
  position: absolute; bottom: 0; left: 0; right: 0;
  height: 80%;
  transition: height 0.6s ease;
  border-radius: 0 0 20px 20px;
}
.tasting-liquid::before {
  content: '';
  position: absolute; top: -5px; left: -5%; width: 110%; height: 10px;
  background: rgba(255,255,255,0.3);
  border-radius: 50%;
  animation: wave 2.5s ease-in-out infinite;
}
.tasting-straw-el {
  position: absolute; top: 0; right: 35px;
  width: 8px; height: 110px;
  background: linear-gradient(180deg, var(--pink), var(--orange));
  border-radius: 4px;
  transform: rotate(-6deg);
  transform-origin: bottom center;
  z-index: 3;
}
/* Steam */
.steam-container {
  position: absolute; top: -5px; left: 50%; transform: translateX(-50%);
  width: 60px; height: 40px;
  z-index: 5;
}
.steam-line {
  position: absolute; bottom: 0;
  width: 8px; height: 20px;
  background: rgba(255,255,255,0.5);
  border-radius: 50%;
  animation: steamRise 2s ease-out infinite;
}
.steam-line:nth-child(1) { left: 10px; animation-delay: 0s; }
.steam-line:nth-child(2) { left: 25px; animation-delay: 0.6s; }
.steam-line:nth-child(3) { left: 40px; animation-delay: 1.2s; }

/* Sip button */
.btn-sip-wrap {
  position: relative;
  display: inline-block;
  margin-bottom: 20px;
}
.sip-pulse-ring {
  position: absolute;
  top: 50%; left: 50%;
  width: 90px; height: 90px;
  margin: -45px 0 0 -45px;
  border: 2px solid var(--pink);
  border-radius: 50%;
  animation: pulse 2s ease-out infinite;
}
.sip-pulse-ring:nth-child(2) { animation-delay: 0.6s; }
.sip-pulse-ring:nth-child(3) { animation-delay: 1.2s; }
.btn-sip {
  width: 80px; height: 80px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--pink), var(--orange));
  color: #fff;
  font-size: 0.95rem;
  font-family: inherit;
  box-shadow: 0 4px 20px rgba(255,107,138,0.4);
  display: flex; align-items: center; justify-content: center;
  position: relative;
  z-index: 2;
  transition: transform 0.15s;
}
.btn-sip:active { transform: scale(0.92); }

/* Sip progress dots */
.sip-dots {
  display: flex; gap: 6px; justify-content: center;
  margin-bottom: 20px;
}
.sip-dot {
  width: 12px; height: 12px;
  border-radius: 50%;
  background: #F0E8E0;
  transition: background 0.3s;
}
.sip-dot.filled { background: var(--pink); }

/* Emotion bubble */
.emotion-bubble {
  position: fixed;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%);
  background: #fff;
  border-radius: 20px;
  padding: 16px 24px;
  box-shadow: 0 8px 30px rgba(0,0,0,0.12);
  font-size: 1.1rem;
  color: var(--black);
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.3s;
  white-space: nowrap;
}
.emotion-bubble.show {
  opacity: 1;
  animation: floatUp 1.5s ease-out forwards;
}

/* ================================================
   SCENE 5: RESULT
   ================================================ */
#scene-result {
  background: linear-gradient(180deg, #FFF8F0 0%, #FFE8D6 100%);
  justify-content: center;
  padding: 30px 24px;
  text-align: center;
}
.result-card {
  width: 345px;
  max-width: 100%;
  background: #fff;
  border-radius: 24px;
  box-shadow: 0 8px 40px rgba(0,0,0,0.08);
  overflow: hidden;
  padding: 32px 24px 24px;
}
.result-card-header h3 {
  font-size: 1.5rem;
  color: var(--black);
}
.result-card-header p {
  font-size: 0.85rem;
  color: var(--brown);
  letter-spacing: 1px;
  margin-bottom: 20px;
}
.result-card-body { margin-bottom: 24px; }
.result-subtitle {
  font-size: 0.85rem;
  color: #999;
  margin-bottom: 12px;
}
.result-recipe-name {
  font-size: 1.3rem;
  color: var(--black);
  margin-bottom: 16px;
}
.result-details {
  display: flex; flex-wrap: wrap; gap: 8px;
  justify-content: center;
  margin-bottom: 16px;
}
.result-tag {
  padding: 6px 14px;
  background: #FFF8F0;
  border-radius: 50px;
  font-size: 0.8rem;
  color: var(--brown);
}
.result-message {
  font-size: 1rem;
  color: #8B7355;
  line-height: 1.6;
  margin-bottom: 20px;
  padding: 0 8px;
}
.result-calories {
  font-size: 1.6rem;
  color: var(--green);
  margin-bottom: 8px;
}
.result-calories .unit {
  font-size: 0.85rem;
}
.result-actions {
  display: flex; gap: 10px;
}
.result-actions button {
  flex: 1;
  padding: 14px 8px;
  border-radius: 50px;
  font-size: 0.9rem;
  font-family: inherit;
  transition: transform 0.15s;
}
.result-actions button:active { transform: scale(0.96); }
.btn-save {
  background: linear-gradient(135deg, var(--pink), var(--orange));
  color: #fff;
  box-shadow: 0 4px 16px rgba(255,107,138,0.3);
}
.btn-retry {
  background: #F0E8E0;
  color: var(--black);
}
</style>
</head>
<body>

<!-- ========== SCENE 1: HOME ========== -->
<div id="scene-home" class="scene active">
  <div class="home-content">
    <div class="home-cup">
      <div class="cup-straw-home"></div>
      <div class="cup-rim"></div>
      <div class="cup-body-css">
        <div class="cup-liquid-home"></div>
        <div class="cup-bubble" style="width:6px;height:6px;bottom:30%;left:20%;animation-delay:0s;"></div>
        <div class="cup-bubble" style="width:4px;height:4px;bottom:50%;left:60%;animation-delay:1s;"></div>
        <div class="cup-bubble" style="width:5px;height:5px;bottom:40%;left:75%;animation-delay:2s;"></div>
      </div>
    </div>
    <h1 class="home-title brand-title">假装喝奶茶</h1>
    <p class="home-subtitle">Fake Boba</p>
    <p class="emotion-text">很想喝但暂时不喝？<br>来假装喝一杯吧！</p>
    <div class="cta-group">
      <button class="btn-primary" onclick="randomRecipe()">&#x1F3B2; 随机来一杯</button>
      <button class="btn-outline" onclick="goToScene('recipe')">&#x1F4CB; 自己选配方</button>
    </div>
    <p class="social-proof">已有 <span id="drink-count">12,345</span> 人假装喝过</p>
  </div>
</div>

<!-- ========== SCENE 2: RECIPE ========== -->
<div id="scene-recipe" class="scene">
  <div class="recipe-header">
    <button class="btn-back" onclick="goToScene('home')">&#x2190;</button>
    <h2 class="brand-title">选配方</h2>
  </div>
  <div class="progress-bar"><div class="progress-fill" id="recipe-progress" style="width:25%"></div></div>
  <p class="step-label" id="step-label">第 1 步 / 共 4 步 · 选杯型</p>

  <!-- Step 1: Cup type -->
  <div class="step-panel active" id="step-0">
    <div class="cup-options">
      <div class="cup-card" onclick="selectCup(this,'classic')">
        <div class="cup-card-icon"></div>
        <span>经典杯</span>
      </div>
      <div class="cup-card" onclick="selectCup(this,'fat')">
        <div class="cup-card-icon fat"></div>
        <span>胖胖杯</span>
      </div>
      <div class="cup-card" onclick="selectCup(this,'tall')">
        <div class="cup-card-icon tall"></div>
        <span>高瘦杯</span>
      </div>
    </div>
  </div>

  <!-- Step 2: Tea -->
  <div class="step-panel" id="step-1">
    <div class="tea-grid" id="tea-grid"></div>
  </div>

  <!-- Step 3: Toppings -->
  <div class="step-panel" id="step-2">
    <div class="topping-pills" id="topping-pills"></div>
    <p class="topping-count" id="topping-count">已选 0/3 个小料</p>
  </div>

  <!-- Step 4: Sweetness & Ice -->
  <div class="step-panel" id="step-3">
    <div class="slider-group">
      <p class="slider-label">甜度</p>
      <div class="segment-control" id="sweetness-control"></div>
      <p class="slider-label">冰度</p>
      <div class="segment-control" id="ice-control"></div>
    </div>
  </div>

  <div class="recipe-nav">
    <button class="btn-prev hidden" id="btn-prev" onclick="prevStep()">上一步</button>
    <button class="btn-next" id="btn-next" onclick="nextStep()" disabled>下一步</button>
  </div>
</div>

<!-- ========== SCENE 3: MAKING ========== -->
<div id="scene-making" class="scene">
  <h2 class="making-title brand-title" id="making-title">正在制作中...</h2>
  <div class="making-area" id="making-area">
    <div class="tea-stream" id="tea-stream"></div>
    <div class="making-straw"></div>
    <div class="making-cup-rim"></div>
    <div class="making-cup-body" id="making-cup-body">
      <div class="making-liquid" id="making-liquid"></div>
      <div id="making-toppings-container"></div>
    </div>
  </div>
  <div class="shake-area hidden" id="shake-area">
    <button class="btn-shake" id="btn-shake" onclick="doShake()">&#x1F4AA; 摇一摇！</button>
    <p class="shake-count-text" id="shake-count-text">0 / 8</p>
    <div class="shake-progress-bar">
      <div class="shake-progress-fill" id="shake-progress-fill"></div>
    </div>
  </div>
</div>

<!-- ========== SCENE 4: TASTING ========== -->
<div id="scene-tasting" class="scene">
  <div class="tasting-header">
    <h2 class="brand-title">你的奶茶好了！</h2>
    <p class="sip-progress" id="sip-progress">第 0 / 5 口</p>
  </div>
  <div class="tasting-cup-area" id="tasting-cup-area">
    <div class="steam-container">
      <div class="steam-line"></div>
      <div class="steam-line"></div>
      <div class="steam-line"></div>
    </div>
    <div class="tasting-straw-el"></div>
    <div class="tasting-cup-rim"></div>
    <div class="tasting-cup-body">
      <div class="tasting-liquid" id="tasting-liquid"></div>
    </div>
  </div>
  <div class="sip-dots" id="sip-dots"></div>
  <div class="btn-sip-wrap" id="btn-sip-wrap">
    <div class="sip-pulse-ring"></div>
    <div class="sip-pulse-ring"></div>
    <div class="sip-pulse-ring"></div>
    <button class="btn-sip" id="btn-sip" onclick="takeSip()">喝一口！</button>
  </div>
  <button class="btn-primary hidden" id="btn-result" onclick="goToScene('result')">查看结果卡</button>
</div>

<!-- ========== SCENE 5: RESULT ========== -->
<div id="scene-result" class="scene">
  <div class="result-card" id="result-card">
    <div class="result-card-header">
      <h3 class="brand-title">假装喝奶茶</h3>
      <p>Fake Boba</p>
    </div>
    <div class="result-card-body">
      <p class="result-subtitle">今天我假装喝了</p>
      <p class="result-recipe-name" id="result-recipe-name"></p>
      <div class="result-details" id="result-details"></div>
      <p class="result-message" id="result-message"></p>
      <div class="result-calories">
        <span id="result-calories">0</span>
        <span class="unit"> kcal 热量已节省</span>
      </div>
    </div>
    <div class="result-actions">
      <button class="btn-save" onclick="saveCard()">保存图片</button>
      <button class="btn-retry" onclick="resetAll()">再来一杯</button>
    </div>
  </div>
</div>

<!-- Emotion bubble overlay -->
<div class="emotion-bubble" id="emotion-bubble"></div>

<script>
/* ===== DATA ===== */
var PRESETS = [
  { name:'经典珍珠奶茶', tea:'红茶', toppings:['珍珠'], sweet:'七分甜', ice:'正常冰', color:'#C4956A', cal:450 },
  { name:'芋泥波波', tea:'芋泥', toppings:['芋圆','珍珠'], sweet:'七分甜', ice:'少冰', color:'#B39DDB', cal:520 },
  { name:'杨枝甘露', tea:'芒果', toppings:['椰果'], sweet:'五分甜', ice:'正常冰', color:'#FFD54F', cal:380 },
  { name:'黑糖鲜奶', tea:'黑糖', toppings:['珍珠'], sweet:'七分甜', ice:'少冰', color:'#8D6E63', cal:480 },
  { name:'抹茶拿铁', tea:'抹茶', toppings:['红豆'], sweet:'三分甜', ice:'去冰', color:'#8BC34A', cal:320 },
  { name:'芝士奶盖乌龙', tea:'乌龙', toppings:['芝士奶盖'], sweet:'五分甜', ice:'少冰', color:'#D4B896', cal:400 }
];

var TEA_OPTIONS = [
  { name:'红茶', color:'#C4956A' },
  { name:'绿茶', color:'#8BC34A' },
  { name:'乌龙', color:'#D4B896' },
  { name:'芋泥', color:'#B39DDB' },
  { name:'芒果', color:'#FFD54F' },
  { name:'黑糖', color:'#8D6E63' }
];

var TOPPING_OPTIONS = ['珍珠','芋圆','椰果','红豆','仙草','布丁','芝士奶盖','奥利奥碎'];

var SWEET_OPTIONS = ['无糖','三分甜','五分甜','七分甜','全糖'];
var ICE_OPTIONS = ['去冰','少冰','正常冰','多冰','热饮'];

var SIP_MESSAGES = [
  '嗯~ 好满足！','珍珠QQ的！','奶味刚刚好~','再来一口！',
  '快乐在冒泡~','这个甜度绝了','假装喝到了！','灵魂被治愈了',
  '今天也是幸福的一天','热量？不存在的！'
];

var RESULT_MESSAGES = [
  '恭喜你成功假装喝了一杯奶茶！虽然没有真的喝到，但快乐是真的！',
  '这杯假装奶茶的热量为零，但幸福感是百分之百的！',
  '你是一个懂得自我满足的人，假装喝奶茶也能这么开心！',
  '今天的奶茶虽然不存在，但你认真对待生活的态度值得点赞！',
  '假装喝奶茶，真实地快乐。这就是生活的艺术！'
];

/* ===== STATE ===== */
var state = {
  cup: '',
  tea: '',
  teaColor: '#C4956A',
  toppings: [],
  sweet: '',
  ice: '',
  recipeName: '',
  recipeCal: 0,
  liquidColor: '#C4956A',
  sipCount: 0,
  shakeCount: 0,
  makingTimer: null
};

var recipeStep = 0;

/* ===== SCENE SWITCHING ===== */
function goToScene(name) {
  var scenes = document.querySelectorAll('.scene');
  for (var i = 0; i < scenes.length; i++) {
    scenes[i].classList.remove('active');
  }
  var target = document.getElementById('scene-' + name);
  if (target) {
    target.classList.add('active');
  }
  window.scrollTo(0, 0);

  if (name === 'making') startMaking();
  if (name === 'tasting') initTasting();
  if (name === 'result') renderResult();
}

/* ===== HOME ===== */
function randomRecipe() {
  var preset = PRESETS[Math.floor(Math.random() * PRESETS.length)];
  state.cup = 'classic';
  state.tea = preset.tea;
  state.teaColor = preset.color;
  state.toppings = preset.toppings.slice();
  state.sweet = preset.sweet;
  state.ice = preset.ice;
  state.recipeName = preset.name;
  state.recipeCal = preset.cal;
  state.liquidColor = preset.color;
  state.sipCount = 0;
  state.shakeCount = 0;
  goToScene('making');
}

/* ===== RECIPE ===== */
function initRecipe() {
  recipeStep = 0;
  state.cup = '';
  state.tea = '';
  state.teaColor = '#C4956A';
  state.toppings = [];
  state.sweet = '';
  state.ice = '';
  updateRecipeUI();
  buildTeaGrid();
  buildToppingPills();
  buildSegmentControls();
}

function updateRecipeUI() {
  // Update progress
  var pct = ((recipeStep + 1) / 4) * 100;
  document.getElementById('recipe-progress').style.width = pct + '%';

  // Update step label
  var labels = ['选杯型', '选茶底', '选小料', '甜度 & 冰度'];
  document.getElementById('step-label').textContent = '第 ' + (recipeStep + 1) + ' 步 / 共 4 步 · ' + labels[recipeStep];

  // Show/hide step panels
  for (var i = 0; i < 4; i++) {
    var panel = document.getElementById('step-' + i);
    if (i === recipeStep) {
      panel.classList.add('active');
    } else {
      panel.classList.remove('active');
    }
  }

  // Prev button
  var btnPrev = document.getElementById('btn-prev');
  if (recipeStep === 0) {
    btnPrev.classList.add('hidden');
  } else {
    btnPrev.classList.remove('hidden');
  }

  // Next button text & disabled
  var btnNext = document.getElementById('btn-next');
  btnNext.disabled = !isStepValid(recipeStep);
  if (recipeStep === 3) {
    btnNext.textContent = '开始制作！';
  } else {
    btnNext.textContent = '下一步';
  }
}

function isStepValid(step) {
  if (step === 0) return state.cup !== '';
  if (step === 1) return state.tea !== '';
  if (step === 2) return state.toppings.length > 0;
  if (step === 3) return state.sweet !== '' && state.ice !== '';
  return false;
}

function selectCup(el, type) {
  var cards = document.querySelectorAll('.cup-card');
  for (var i = 0; i < cards.length; i++) cards[i].classList.remove('selected');
  el.classList.add('selected');
  state.cup = type;
  document.getElementById('btn-next').disabled = false;
}

function buildTeaGrid() {
  var grid = document.getElementById('tea-grid');
  grid.innerHTML = '';
  for (var i = 0; i < TEA_OPTIONS.length; i++) {
    var t = TEA_OPTIONS[i];
    var div = document.createElement('div');
    div.className = 'tea-item';
    div.setAttribute('data-tea', t.name);
    div.innerHTML = '<div class="tea-color" style="background:' + t.color + '"></div><span>' + t.name + '</span>';
    div.onclick = (function(name, color, element) {
      return function() { selectTea(name, color, element); };
    })(t.name, t.color, div);
    grid.appendChild(div);
  }
}

function selectTea(name, color, el) {
  var items = document.querySelectorAll('.tea-item');
  for (var i = 0; i < items.length; i++) items[i].classList.remove('selected');
  el.classList.add('selected');
  state.tea = name;
  state.teaColor = color;
  document.getElementById('btn-next').disabled = false;
}

function buildToppingPills() {
  var container = document.getElementById('topping-pills');
  container.innerHTML = '';
  for (var i = 0; i < TOPPING_OPTIONS.length; i++) {
    var name = TOPPING_OPTIONS[i];
    var pill = document.createElement('div');
    pill.className = 'topping-pill';
    pill.textContent = name;
    pill.setAttribute('data-topping', name);
    pill.onclick = (function(n, element) {
      return function() { toggleTopping(n, element); };
    })(name, pill);
    container.appendChild(pill);
  }
}

function toggleTopping(name, el) {
  var idx = state.toppings.indexOf(name);
  if (idx >= 0) {
    state.toppings.splice(idx, 1);
    el.classList.remove('selected');
  } else {
    if (state.toppings.length >= 3) return;
    state.toppings.push(name);
    el.classList.add('selected');
  }
  document.getElementById('topping-count').textContent = '已选 ' + state.toppings.length + '/3 个小料';
  document.getElementById('btn-next').disabled = state.toppings.length === 0;
}

function buildSegmentControls() {
  buildSegment('sweetness-control', SWEET_OPTIONS, function(val) {
    state.sweet = val;
    document.getElementById('btn-next').disabled = !(state.sweet && state.ice);
  });
  buildSegment('ice-control', ICE_OPTIONS, function(val) {
    state.ice = val;
    document.getElementById('btn-next').disabled = !(state.sweet && state.ice);
  });
}

function buildSegment(containerId, options, callback) {
  var container = document.getElementById(containerId);
  container.innerHTML = '';
  for (var i = 0; i < options.length; i++) {
    var btn = document.createElement('button');
    btn.className = 'segment-btn';
    btn.textContent = options[i];
    btn.onclick = (function(val, element) {
      return function() {
        var siblings = element.parentElement.querySelectorAll('.segment-btn');
        for (var j = 0; j < siblings.length; j++) siblings[j].classList.remove('active');
        element.classList.add('active');
        callback(val);
      };
    })(options[i], btn);
    container.appendChild(btn);
  }
}

function nextStep() {
  if (!isStepValid(recipeStep)) return;
  if (recipeStep < 3) {
    recipeStep++;
    updateRecipeUI();
  } else {
    // Finish recipe selection
    buildCustomRecipe();
    goToScene('making');
  }
}

function prevStep() {
  if (recipeStep > 0) {
    recipeStep--;
    updateRecipeUI();
  }
}

function buildCustomRecipe() {
  // Build recipe name from selections
  var teaName = state.tea;
  var toppingStr = state.toppings.length > 0 ? state.toppings[0] : '';
  state.recipeName = teaName + (toppingStr ? toppingStr : '奶茶');
  state.liquidColor = state.teaColor;
  // Estimate calories
  state.recipeCal = 300 + state.toppings.length * 60;
  if (state.sweet === '全糖') state.recipeCal += 80;
  if (state.sweet === '七分甜') state.recipeCal += 50;
  if (state.sweet === '五分甜') state.recipeCal += 30;
  state.sipCount = 0;
  state.shakeCount = 0;
}

/* ===== MAKING ===== */
function startMaking() {
  // Reset making UI
  document.getElementById('making-title').textContent = '正在制作中...';
  document.getElementById('shake-area').classList.add('hidden');
  document.getElementById('tea-stream').classList.remove('show');
  document.getElementById('tea-stream').style.height = '0px';

  var liquid = document.getElementById('making-liquid');
  liquid.style.height = '0%';
  liquid.style.background = state.liquidColor;

  // Clear toppings
  document.getElementById('making-toppings-container').innerHTML = '';

  // Phase 1: Pour tea (2s)
  document.getElementById('making-title').textContent = '倒茶中...';
  var stream = document.getElementById('tea-stream');
  stream.style.background = state.liquidColor;

  setTimeout(function() {
    stream.classList.add('show');
    stream.style.height = '80px';
  }, 300);

  setTimeout(function() {
    liquid.style.height = '70%';
  }, 500);

  setTimeout(function() {
    stream.classList.remove('show');
    stream.style.height = '0px';
  }, 2200);

  // Phase 2: Add toppings (1s each)
  var toppingDelay = 2500;
  for (var i = 0; i < state.toppings.length; i++) {
    (function(index) {
      setTimeout(function() {
        document.getElementById('making-title').textContent = '加' + state.toppings[index] + '...';
        addMakingTopping(index);
      }, toppingDelay + index * 1000);
    })(i);
  }

  // Phase 3: Shake
  var shakeDelay = toppingDelay + state.toppings.length * 1000 + 500;
  setTimeout(function() {
    document.getElementById('making-title').textContent = '摇一摇！';
    document.getElementById('shake-area').classList.remove('hidden');
    state.shakeCount = 0;
    updateShakeUI();
  }, shakeDelay);
}

function addMakingTopping(index) {
  var container = document.getElementById('making-toppings-container');
  var dot = document.createElement('div');
  dot.className = 'making-topping-dot';
  // Position randomly in lower part of cup
  var left = 15 + Math.random() * 70;
  var bottom = 5 + Math.random() * 40;
  dot.style.left = left + '%';
  dot.style.bottom = bottom + '%';
  // Topping colors
  var colors = { '珍珠':'#2D1B0E', '芋圆':'#B39DDB', '椰果':'#F5F5DC', '红豆':'#8B4513', '仙草':'#1a1a1a', '布丁':'#FFD700', '芝士奶盖':'#FFFDD0', '奥利奥碎':'#1a1a1a' };
  var toppingName = state.toppings[index];
  dot.style.background = colors[toppingName] || '#8B7355';
  container.appendChild(dot);
  setTimeout(function() { dot.classList.add('show'); }, 50);
}

function doShake() {
  state.shakeCount++;
  updateShakeUI();

  // Shake animation on cup
  var cupBody = document.getElementById('making-cup-body');
  cupBody.style.animation = 'none';
  cupBody.offsetHeight; // trigger reflow
  cupBody.style.animation = 'shakeAnim 0.4s ease-in-out';

  if (state.shakeCount >= 8) {
    // Done shaking
    setTimeout(function() {
      document.getElementById('shake-area').classList.add('hidden');
      document.getElementById('making-title').textContent = '完成！';
      setTimeout(function() {
        goToScene('tasting');
      }, 600);
    }, 300);
  }
}

function updateShakeUI() {
  document.getElementById('shake-count-text').textContent = state.shakeCount + ' / 8';
  document.getElementById('shake-progress-fill').style.width = (state.shakeCount / 8 * 100) + '%';
}

/* ===== TASTING ===== */
function initTasting() {
  state.sipCount = 0;
  var liquid = document.getElementById('tasting-liquid');
  liquid.style.height = '80%';
  liquid.style.background = state.liquidColor;

  // Build sip dots
  var dotsContainer = document.getElementById('sip-dots');
  dotsContainer.innerHTML = '';
  for (var i = 0; i < 5; i++) {
    var dot = document.createElement('div');
    dot.className = 'sip-dot';
    dot.id = 'sip-dot-' + i;
    dotsContainer.appendChild(dot);
  }

  document.getElementById('sip-progress').textContent = '第 0 / 5 口';
  document.getElementById('btn-sip').classList.remove('hidden');
  document.getElementById('btn-sip-wrap').classList.remove('hidden');
  document.getElementById('btn-result').classList.add('hidden');
}

function takeSip() {
  if (state.sipCount >= 5) return;
  state.sipCount++;

  // Lower liquid
  var liquid = document.getElementById('tasting-liquid');
  var newHeight = 80 - (state.sipCount * 16);
  if (newHeight < 0) newHeight = 0;
  liquid.style.height = newHeight + '%';

  // Update progress
  document.getElementById('sip-progress').textContent = '第 ' + state.sipCount + ' / 5 口';

  // Fill dot
  var dot = document.getElementById('sip-dot-' + (state.sipCount - 1));
  if (dot) dot.classList.add('filled');

  // Show emotion bubble
  showEmotionBubble();

  if (state.sipCount >= 5) {
    // Done drinking
    setTimeout(function() {
      document.getElementById('btn-sip').classList.add('hidden');
      document.getElementById('btn-sip-wrap').classList.add('hidden');
      document.getElementById('btn-result').classList.remove('hidden');
    }, 1600);
  }
}

function showEmotionBubble() {
  var bubble = document.getElementById('emotion-bubble');
  var msg = SIP_MESSAGES[Math.floor(Math.random() * SIP_MESSAGES.length)];
  bubble.textContent = msg;
  bubble.classList.remove('show');
  bubble.offsetHeight; // reflow
  bubble.classList.add('show');
  setTimeout(function() {
    bubble.classList.remove('show');
  }, 1500);
}

/* ===== RESULT ===== */
function renderResult() {
  document.getElementById('result-recipe-name').textContent = state.recipeName;

  // Build tags
  var details = document.getElementById('result-details');
  details.innerHTML = '';
  var tags = [state.sweet, state.ice];
  for (var i = 0; i < state.toppings.length; i++) {
    tags.push(state.toppings[i]);
  }
  for (var j = 0; j < tags.length; j++) {
    var tag = document.createElement('span');
    tag.className = 'result-tag';
    tag.textContent = tags[j];
    details.appendChild(tag);
  }

  // Message
  var msg = RESULT_MESSAGES[Math.floor(Math.random() * RESULT_MESSAGES.length)];
  document.getElementById('result-message').textContent = msg;

  // Calories
  document.getElementById('result-calories').textContent = state.recipeCal;
}

function saveCard() {
  // Load html2canvas on demand
  if (typeof html2canvas === 'undefined') {
    var script = document.createElement('script');
    script.src = 'https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js';
    script.onload = function() { doSaveCard(); };
    script.onerror = function() { alert('图片库加载失败，请检查网络后重试'); };
    document.head.appendChild(script);
  } else {
    doSaveCard();
  }
}

function doSaveCard() {
  var card = document.getElementById('result-card');
  html2canvas(card, {
    backgroundColor: '#FFFFFF',
    scale: 2,
    useCORS: true
  }).then(function(canvas) {
    var link = document.createElement('a');
    link.download = '假装喝奶茶-' + state.recipeName + '.png';
    link.href = canvas.toDataURL('image/png');
    link.click();
  }).catch(function() {
    alert('保存失败，请重试');
  });
}

function resetAll() {
  state.cup = '';
  state.tea = '';
  state.teaColor = '#C4956A';
  state.toppings = [];
  state.sweet = '';
  state.ice = '';
  state.recipeName = '';
  state.recipeCal = 0;
  state.liquidColor = '#C4956A';
  state.sipCount = 0;
  state.shakeCount = 0;
  recipeStep = 0;
  goToScene('home');
}

/* ===== INIT ===== */
// Override goToScene('recipe') to also init recipe
var _origGoToScene = goToScene;
goToScene = function(name) {
  _origGoToScene(name);
  if (name === 'recipe') initRecipe();
};

// Animate drink count on load
(function() {
  var el = document.getElementById('drink-count');
  if (el) {
    var base = 12345;
    var rand = Math.floor(Math.random() * 500);
    el.textContent = (base + rand).toLocaleString();
  }
})();
</script>
</body>
</html>
