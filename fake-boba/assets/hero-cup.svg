<svg viewBox="0 0 200 240" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Shadow -->
  <ellipse cx="100" cy="230" rx="60" ry="8" fill="rgba(196,149,106,0.12)"/>
  <!-- Cup body -->
  <path d="M50,40 L55,210 Q55,225 75,225 L125,225 Q145,225 145,210 L150,40 Z" fill="rgba(255,255,255,0.85)" stroke="#DDD0C4" stroke-width="1.5"/>
  <!-- Glass highlight -->
  <path d="M60,50 L62,200 Q62,210 70,210 L75,210 Q68,210 67,200 L64,50 Z" fill="rgba(255,255,255,0.6)"/>
  <path d="M68,55 L70,190 Q70,198 76,198" stroke="rgba(255,255,255,0.8)" stroke-width="1" fill="none"/>
  <!-- Liquid -->
  <path d="M55,80 L55,210 Q55,225 75,225 L125,225 Q145,225 145,210 L145,80 Z" fill="#D4A574" opacity="0.7" clip-path="inset(0 0 0 0 round 0 0 20px 20px)"/>
  <ellipse cx="100" cy="80" rx="45" ry="8" fill="#C4956A" opacity="0.6">
    <animate attributeName="rx" values="45;43;45;47;45" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="ry" values="8;9;7;9;8" dur="3s" repeatCount="indefinite"/>
  </ellipse>
  <!-- Toppings (boba) -->
  <circle cx="80" cy="195" r="7" fill="#2D1B0E" opacity="0.9"/>
  <circle cx="110" cy="200" r="6" fill="#2D1B0E" opacity="0.85"/>
  <circle cx="95" cy="210" r="7" fill="#2D1B0E" opacity="0.9"/>
  <circle cx="120" cy="190" r="5" fill="#2D1B0E" opacity="0.8"/>
  <circle cx="75" cy="205" r="6" fill="#2D1B0E" opacity="0.85"/>
  <!-- Foam top (milk cap) -->
  <ellipse cx="100" cy="75" rx="42" ry="10" fill="#FFFDD0" opacity="0.7"/>
  <!-- Cup lid -->
  <rect x="46" y="36" width="108" height="10" rx="5" fill="#E8DDD4"/>
  <rect x="46" y="36" width="108" height="5" rx="3" fill="#F0E8E0"/>
  <!-- Straw -->
  <line x1="120" y1="10" x2="108" y2="140" stroke="#FFB6C1" stroke-width="6" stroke-linecap="round"/>
  <line x1="120" y1="10" x2="108" y2="140" stroke="#FF69B4" stroke-width="3" stroke-linecap="round" opacity="0.3"/>
  <rect x="114" y="6" width="12" height="10" rx="4" fill="#FFB6C1"/>
  <!-- Steam (animated) -->
  <path d="M90,28 Q88,18 92,10" stroke="rgba(255,255,255,0.4)" stroke-width="2" fill="none" stroke-linecap="round">
    <animate attributeName="opacity" values="0.4;0.1;0.4" dur="2.5s" repeatCount="indefinite"/>
    <animate attributeName="d" values="M90,28 Q88,18 92,10;M90,26 Q86,16 93,8;M90,28 Q88,18 92,10" dur="2.5s" repeatCount="indefinite"/>
  </path>
  <path d="M100,25 Q98,15 102,5" stroke="rgba(255,255,255,0.3)" stroke-width="2" fill="none" stroke-linecap="round">
    <animate attributeName="opacity" values="0.3;0.08;0.3" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="d" values="M100,25 Q98,15 102,5;M100,23 Q96,13 103,3;M100,25 Q98,15 102,5" dur="3s" repeatCount="indefinite"/>
  </path>
  <path d="M110,28 Q108,18 112,10" stroke="rgba(255,255,255,0.35)" stroke-width="2" fill="none" stroke-linecap="round">
    <animate attributeName="opacity" values="0.35;0.1;0.35" dur="2.8s" repeatCount="indefinite"/>
    <animate attributeName="d" values="M110,28 Q108,18 112,10;M110,26 Q106,16 113,8;M110,28 Q108,18 112,10" dur="2.8s" repeatCount="indefinite"/>
  </path>
</svg>
