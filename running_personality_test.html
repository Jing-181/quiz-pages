<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>RPT · 跑者人格测试</title>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --mint: #5EBD8E;
      --sky: #6CB4EE;
      --dawn: #F4A261;
      --rose: #E88D9D;
      --lavender: #B8A9C9;
      --sage: #A8C5A0;
      --cream: #FDF8F0;
      --cream-warm: #FBF3E8;
      --text-dark: #2D3436;
      --text-mid: #636E72;
      --text-light: #B2BEC3;
      --card-bg: rgba(255, 255, 255, 0.75);
      --card-border: rgba(255, 255, 255, 0.9);
      --card-shadow: 0 4px 24px rgba(94, 189, 142, 0.08);
      --opt-bg: rgba(255, 255, 255, 0.6);
      --opt-border: rgba(94, 189, 142, 0.15);
      --opt-sel-bg: rgba(94, 189, 142, 0.12);
      --opt-sel-border: rgba(94, 189, 142, 0.4);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      overflow: hidden;
      height: 100dvh;
      background: var(--cream);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Noto Sans SC', 'PingFang SC', sans-serif;
      color: var(--text-dark);
    }

    .fQ { font-family: 'Quicksand', 'Noto Sans SC', sans-serif; }

    #app {
      position: relative;
      overflow: hidden;
      width: 100%;
      max-width: 430px;
      height: 100dvh;
      max-height: 860px;
      background: var(--cream);
      display: flex;
      flex-direction: column;
    }

    @media(min-height:900px) {
      #app {
        border-radius: 28px;
        height: calc(100dvh - 48px);
        box-shadow: 0 12px 60px rgba(94, 189, 142, 0.12), 0 2px 12px rgba(0,0,0,0.04);
      }
    }

    /* Background decorative elements */
    .bg-deco {
      position: absolute;
      pointer-events: none;
      z-index: 0;
      border-radius: 50%;
    }
    .bg-blob-1 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, rgba(94,189,142,0.12) 0%, transparent 70%);
      top: -60px; right: -80px;
      animation: blobFloat 16s ease-in-out infinite;
    }
    .bg-blob-2 {
      width: 250px; height: 250px;
      background: radial-gradient(circle, rgba(108,180,238,0.10) 0%, transparent 70%);
      bottom: 5%; left: -60px;
      animation: blobFloat 20s ease-in-out infinite reverse;
    }
    .bg-blob-3 {
      width: 200px; height: 200px;
      background: radial-gradient(circle, rgba(244,162,97,0.08) 0%, transparent 70%);
      top: 35%; left: 50%;
      animation: blobFloat 14s ease-in-out infinite 3s;
    }

    @keyframes blobFloat {
      0%, 100% { transform: translate(0, 0) scale(1); }
      33% { transform: translate(15px, -20px) scale(1.05); }
      66% { transform: translate(-10px, 15px) scale(0.95); }
    }

    /* Subtle grain texture overlay */
    #app::before {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 0;
      pointer-events: none;
      opacity: 0.025;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
    }

    /* Header */
    #hdr {
      flex-shrink: 0;
      z-index: 20;
      background: rgba(253, 248, 240, 0.85);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid rgba(94, 189, 142, 0.1);
      padding: 12px 18px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .hLogo {
      font-family: 'Quicksand', sans-serif;
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 0.15em;
      color: var(--mint);
    }

    .hTitle {
      font-size: 13px;
      color: var(--text-mid);
      font-weight: 500;
    }

    .hTag {
      font-family: 'Quicksand', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.12em;
      padding: 4px 12px;
      border-radius: 99px;
      background: linear-gradient(135deg, var(--mint), var(--sky));
      color: white;
    }

    /* Scene containers */
    .sc {
      position: absolute;
      inset: 0;
      z-index: 1;
      display: flex;
      flex-direction: column;
      transition: opacity 0.35s ease, transform 0.35s ease;
    }
    .sc.hidden {
      opacity: 0;
      pointer-events: none;
      transform: translateY(10px);
    }

    /* ========== START ========== */
    #sStart {
      align-items: center;
      justify-content: center;
      padding: 24px 24px 32px;
      text-align: center;
      overflow-y: auto;
    }

    .logoWrap {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(145deg, rgba(94,189,142,0.15), rgba(108,180,238,0.12));
      border: 2px solid rgba(94, 189, 142, 0.2);
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 22px;
      font-size: 56px;
      animation: gentleBounce 5s ease-in-out infinite, logoEntrance 0.8s cubic-bezier(.34, 1.56, .64, 1) both;
      box-shadow: 0 8px 32px rgba(94, 189, 142, 0.1);
    }

    @keyframes logoEntrance {
      0% { transform: scale(0) rotate(-20deg); opacity: 0; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    @keyframes gentleBounce {
      0%, 100% { transform: translateY(0) rotate(0deg); }
      25% { transform: translateY(-8px) rotate(2deg); }
      75% { transform: translateY(-4px) rotate(-1deg); }
    }

    .sTitle {
      font-family: 'Quicksand', 'Noto Sans SC', sans-serif;
      font-size: 32px;
      font-weight: 700;
      line-height: 1.25;
      margin-bottom: 6px;
      color: var(--text-dark);
      animation: fadeSlideUp 0.6s ease 0.2s both;
    }

    .sSub {
      font-family: 'Quicksand', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-light);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      margin-bottom: 22px;
      animation: fadeSlideUp 0.6s ease 0.3s both;
    }

    .infoCard {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 16px 18px;
      font-size: 13px;
      line-height: 2;
      color: var(--text-mid);
      text-align: left;
      margin-bottom: 24px;
      width: 100%;
      box-shadow: var(--card-shadow);
      animation: fadeSlideUp 0.6s ease 0.4s both;
    }

    .infoCard strong {
      color: var(--text-dark);
      font-weight: 600;
    }

    .iTag {
      display: inline-block;
      background: linear-gradient(135deg, var(--mint), var(--sky));
      color: white;
      font-weight: 600;
      font-size: 11px;
      padding: 2px 8px;
      border-radius: 6px;
    }

    .btnStart {
      width: 100%;
      background: linear-gradient(135deg, var(--mint), var(--sky));
      color: white;
      font-family: 'Quicksand', 'Noto Sans SC', sans-serif;
      font-size: 20px;
      font-weight: 700;
      padding: 17px 0;
      border: none;
      border-radius: 99px;
      letter-spacing: 0.06em;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 6px 24px rgba(94, 189, 142, 0.25);
      position: relative;
      overflow: hidden;
      animation: fadeSlideUp 0.6s ease 0.5s both;
    }

    .btnStart::after {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, var(--sky), var(--lavender));
      opacity: 0;
      transition: opacity 0.3s ease;
      border-radius: inherit;
    }

    .btnStart:hover::after { opacity: 1; }
    .btnStart:active { transform: scale(0.97); box-shadow: 0 2px 12px rgba(94, 189, 142, 0.2); }

    .btnStart span {
      position: relative;
      z-index: 1;
      display: block;
      font-family: 'Quicksand', sans-serif;
      font-size: 11px;
      font-weight: 600;
      opacity: 0.7;
      margin-top: 3px;
      letter-spacing: 0.2em;
    }

    .sDeco {
      margin-top: 28px;
      font-size: 11px;
      color: var(--text-light);
      letter-spacing: 0.15em;
      font-family: 'Quicksand', sans-serif;
      font-weight: 600;
    }

    /* ========== QUIZ ========== */
    #sQuiz { z-index: 8; }

    .qBody {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 18px 18px 12px;
      overflow: hidden;
    }

    .pRow {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
    }

    .pLbl {
      font-size: 11px;
      color: var(--text-light);
      letter-spacing: 0.12em;
      font-family: 'Quicksand', sans-serif;
      font-weight: 600;
    }

    .pLbl em {
      color: var(--mint);
      font-style: normal;
      font-weight: 700;
    }

    .pMod {
      font-size: 10px;
      color: var(--text-light);
      letter-spacing: 0.04em;
      opacity: 0.7;
    }

    .pTrack {
      height: 5px;
      background: rgba(94, 189, 142, 0.1);
      border-radius: 99px;
      overflow: hidden;
      margin-bottom: 18px;
    }

    .pFill {
      height: 100%;
      border-radius: 99px;
      background: linear-gradient(90deg, var(--mint), var(--sky), var(--lavender));
      transition: width 0.5s cubic-bezier(.34, 1.56, .64, 1);
    }

    .qN {
      font-family: 'Quicksand', sans-serif;
      font-size: 12px;
      font-weight: 700;
      color: var(--dawn);
      letter-spacing: 0.18em;
      margin-bottom: 6px;
    }

    .qT {
      font-size: 17px;
      font-weight: 600;
      color: var(--text-dark);
      line-height: 1.65;
      margin-bottom: 4px;
      flex-shrink: 0;
    }

    .qHint {
      font-size: 11px;
      color: var(--text-light);
      margin-bottom: 14px;
      letter-spacing: 0.03em;
      flex-shrink: 0;
      font-style: italic;
      opacity: 0;
      transform: translateY(-4px);
      transition: opacity 0.4s ease, transform 0.4s ease;
    }
    .qHint.show {
      opacity: 1;
      transform: translateY(0);
    }

    .oWrap {
      flex: 1;
      overflow-y: auto;
      padding-right: 2px;
    }

    .oWrap::-webkit-scrollbar { width: 3px; }
    .oWrap::-webkit-scrollbar-thumb { background: rgba(94,189,142,0.2); border-radius: 3px; }

    .opt {
      background: var(--opt-bg);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border: 1.5px solid var(--opt-border);
      border-radius: 16px;
      padding: 14px 14px;
      margin-bottom: 10px;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      cursor: pointer;
      transition: all 0.25s ease;
      -webkit-tap-highlight-color: transparent;
      opacity: 0;
      transform: translateY(12px);
    }

    .opt.show {
      opacity: 1;
      transform: translateY(0);
    }

    .opt:hover {
      background: rgba(255, 255, 255, 0.8);
      border-color: rgba(94, 189, 142, 0.25);
      transform: translateY(-1px);
      box-shadow: 0 4px 16px rgba(94, 189, 142, 0.08);
    }

    .opt.sel {
      background: var(--opt-sel-bg);
      border-color: var(--opt-sel-border);
      box-shadow: 0 4px 20px rgba(94, 189, 142, 0.12);
      transform: translateY(-1px) scale(1.01);
    }

    .oK {
      width: 30px;
      height: 30px;
      flex-shrink: 0;
      border: 2px solid rgba(94, 189, 142, 0.25);
      border-radius: 10px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Quicksand', sans-serif;
      font-size: 13px;
      font-weight: 700;
      color: var(--mint);
      transition: all 0.25s ease;
      background: rgba(255,255,255,0.5);
    }

    .opt.sel .oK {
      background: linear-gradient(135deg, var(--mint), var(--sky));
      border-color: transparent;
      color: white;
      box-shadow: 0 2px 8px rgba(94, 189, 142, 0.25);
    }

    .oT {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-mid);
      line-height: 1.55;
      padding-top: 3px;
      transition: color 0.25s ease;
    }

    .opt.sel .oT { color: var(--text-dark); }

    .qFt {
      flex-shrink: 0;
      padding-top: 10px;
      display: flex;
      gap: 10px;
    }

    .btnP {
      flex: 1;
      background: rgba(94, 189, 142, 0.08);
      color: var(--text-light);
      font-family: 'Quicksand', 'Noto Sans SC', sans-serif;
      font-size: 15px;
      font-weight: 600;
      padding: 13px 0;
      border: 1.5px solid rgba(94, 189, 142, 0.12);
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btnP:active { transform: scale(0.97); }

    .btnNx {
      flex: 2;
      background: rgba(94, 189, 142, 0.08);
      color: var(--text-light);
      font-family: 'Quicksand', 'Noto Sans SC', sans-serif;
      font-size: 16px;
      font-weight: 600;
      padding: 13px 0;
      border: 1.5px solid rgba(94, 189, 142, 0.12);
      border-radius: 14px;
      cursor: not-allowed;
      transition: all 0.25s ease;
    }

    .btnNx.on {
      background: linear-gradient(135deg, var(--mint), var(--sky));
      color: white;
      border-color: transparent;
      box-shadow: 0 4px 18px rgba(94, 189, 142, 0.2);
      cursor: pointer;
    }

    .btnNx.on:active { transform: scale(0.97); }

    /* ========== LOADING ========== */
    #sLoad {
      background: var(--cream);
      z-index: 40;
      align-items: center;
      justify-content: center;
    }

    .lFig {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: linear-gradient(145deg, rgba(94,189,142,0.12), rgba(108,180,238,0.10));
      border: 2px solid rgba(94, 189, 142, 0.15);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
      margin-bottom: 28px;
      animation: gentlePulse 2s ease-in-out infinite;
      box-shadow: 0 8px 32px rgba(94, 189, 142, 0.1);
    }

    @keyframes gentlePulse {
      0%, 100% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.06); opacity: 0.85; }
    }

    .lMsg {
      font-family: 'Quicksand', 'Noto Sans SC', sans-serif;
      font-size: 17px;
      font-weight: 600;
      color: var(--text-dark);
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      padding: 12px 28px;
      border-radius: 99px;
      border: 1px solid var(--card-border);
      letter-spacing: 0.04em;
      text-align: center;
      min-width: 240px;
      transition: opacity 0.3s;
      box-shadow: var(--card-shadow);
    }

    .lSub {
      font-family: 'Quicksand', sans-serif;
      font-size: 11px;
      font-weight: 600;
      color: var(--text-light);
      margin-top: 12px;
      letter-spacing: 0.25em;
      text-transform: uppercase;
    }

    .dots span {
      display: inline-block;
      animation: dF 1.2s ease infinite;
    }
    .dots span:nth-child(2) { animation-delay: .2s; }
    .dots span:nth-child(3) { animation-delay: .4s; }

    @keyframes dF {
      0%, 80%, 100% { opacity: .2; }
      40% { opacity: 1; }
    }

    /* Confetti burst */
    .confetti {
      position: fixed;
      pointer-events: none;
      z-index: 9999;
      width: 8px;
      height: 8px;
      border-radius: 2px;
      animation: confettiFall 1.2s ease-out forwards;
    }
    @keyframes confettiFall {
      0% { opacity: 1; transform: translate(0, 0) rotate(0deg) scale(1); }
      100% { opacity: 0; transform: translate(var(--dx), var(--dy)) rotate(var(--rot)) scale(0.2); }
    }

    /* Milestone flash */
    .milestone-flash {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%) scale(0);
      font-family: 'Quicksand', sans-serif;
      font-size: 16px;
      font-weight: 700;
      color: var(--mint);
      pointer-events: none;
      z-index: 30;
      animation: milestonePop 0.8s ease-out forwards;
      white-space: nowrap;
    }
    @keyframes milestonePop {
      0% { transform: translate(-50%, -50%) scale(0); opacity: 0; }
      30% { transform: translate(-50%, -50%) scale(1.2); opacity: 1; }
      60% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
      100% { transform: translate(-50%, -50%) scale(0.8); opacity: 0; }
    }

    /* Result entrance animations */
    .rEmoji { animation: resultPop 0.6s cubic-bezier(.34, 1.56, .64, 1) forwards; }
    .rEn { animation: fadeSlideUp 0.5s ease 0.15s both; }
    .rNm { animation: fadeSlideUp 0.5s ease 0.25s both; }
    .rBf { animation: fadeSlideUp 0.5s ease 0.35s both; }
    .rBadge { animation: fadeSlideUp 0.4s ease 0.05s both; }

    @keyframes resultPop {
      0% { transform: scale(0.3) rotate(-10deg); opacity: 0; }
      60% { transform: scale(1.1) rotate(3deg); opacity: 1; }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }
    @keyframes fadeSlideUp {
      0% { opacity: 0; transform: translateY(12px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    /* ========== RESULT ========== */
    #sResult { z-index: 50; }

    .rScr {
      flex: 1;
      overflow-y: auto;
    }
    .rScr::-webkit-scrollbar { width: 4px; }
    .rScr::-webkit-scrollbar-thumb { background: rgba(94,189,142,0.15); border-radius: 4px; }

    .rHero {
      padding: 28px 22px 32px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }

    .rHero::after {
      content: 'RPT';
      position: absolute;
      right: -10px;
      top: -8px;
      font-size: 88px;
      font-family: 'Quicksand', sans-serif;
      font-weight: 700;
      color: rgba(94, 189, 142, 0.04);
      pointer-events: none;
      white-space: nowrap;
    }

    .rBadge {
      display: inline-block;
      font-family: 'Quicksand', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      padding: 5px 14px;
      border-radius: 99px;
      background: rgba(94, 189, 142, 0.1);
      border: 1px solid rgba(94, 189, 142, 0.15);
      color: var(--mint);
      margin-bottom: 18px;
    }

    .rEmoji {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(145deg, rgba(94,189,142,0.1), rgba(108,180,238,0.08));
      border: 2px solid rgba(94, 189, 142, 0.15);
      margin: 0 auto 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 58px;
      box-shadow: 0 8px 32px rgba(94, 189, 142, 0.08);
      animation: gentleBounce 5s ease-in-out infinite;
    }

    .rEn {
      font-family: 'Quicksand', sans-serif;
      font-size: 18px;
      font-weight: 700;
      letter-spacing: 0.25em;
      color: var(--sky);
      margin-bottom: 4px;
    }

    .rNm {
      font-family: 'Quicksand', 'Noto Sans SC', sans-serif;
      font-size: 32px;
      font-weight: 700;
      color: var(--text-dark);
      margin-bottom: 12px;
      letter-spacing: 0.04em;
    }

    .rBf {
      display: inline-block;
      background: linear-gradient(135deg, var(--mint), var(--sky));
      color: white;
      font-size: 14px;
      font-weight: 600;
      line-height: 1.7;
      padding: 10px 18px;
      border-radius: 14px;
      max-width: 300px;
      box-shadow: 0 4px 18px rgba(94, 189, 142, 0.15);
    }

    .rBody { padding: 18px 18px 28px; }

    .rCard {
      background: var(--card-bg);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 18px;
      margin-bottom: 14px;
      box-shadow: var(--card-shadow);
    }

    .rCT {
      font-family: 'Quicksand', sans-serif;
      font-size: 11px;
      font-weight: 700;
      color: var(--mint);
      letter-spacing: 0.18em;
      text-transform: uppercase;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .rCT::after {
      content: '';
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, rgba(94,189,142,0.15), transparent);
    }

    .rDes {
      font-size: 14px;
      color: var(--text-mid);
      line-height: 1.9;
    }

    .pTags {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .pTag {
      font-family: 'Quicksand', 'Noto Sans SC', sans-serif;
      font-size: 12px;
      font-weight: 700;
      padding: 5px 12px;
      border-radius: 10px;
      letter-spacing: 0.02em;
      color: white;
    }

    .dBars { margin-top: 14px; }

    .dRow {
      display: flex;

          { t: '参加过几次，主要是为了体验氛围和拍照', s: [-0.3, -0.2, 0.8, -0.2, 0.5, 0.2, 0.3] },
          { t: '还没参加过，但很想试试', s: [-0.3, 0, 0.3, 0, 0, 0.3, 0.5] },
          { t: '不感兴趣，跑步就是自己的事', s: [-0.3, 0.2, -0.8, 0, -0.3, 0.5, 0.3] }

      },
      {
        mod: '模块三·社交与赛事', text: '你更喜欢怎么跑步？', hint: '独狼还是群跑爱好者？',
        opts: [
          { t: '一个人跑，享受独处的时光', s: [0, 0.3, -0.8, 0.3, 0, 0.8, 0.3] },
          { t: '和跑友一起，边跑边聊天', s: [-0.3, 0, 1, 0, 0, 0, 0.3] },
          { t: '参加跑团活动，大家一起才热闹', s: [-0.2, 0, 0.8, 0, 0.3, -0.2, 0] },
          { t: '跟着跑步APP的语音指导跑', s: [0.2, 0.3, -0.5, 0.3, 0.5, -0.3, 0] }
        ]
      },
      {
        mod: '模块三·社交与赛事', text: '跑完步你会做什么？', hint: '跑完第一件事是什么？',
        opts: [
          { t: '拉伸放松+记录数据+分析表现', s: [0.2, 0, -0.5, 0.8, 0.5, -0.3, -0.3] },
          { t: '拍照打卡发朋友圈/跑步群', s: [-0.3, -0.3, 1, -0.3, 0.8, 0, 0.3] },
          { t: '冲个澡然后吃顿好的犒劳自己', s: [-0.3, 0, 0.3, -0.3, -0.3, 0, 0.8] },
          { t: '发跑步数据到跑团群，看看谁今天最快', s: [0.3, 0.2, 0.8, 0, 0.3, -0.2, 0] }
        ]
      },
      {
        mod: '模块四·装备与路线', text: '你有多少双跑鞋？', hint: '一双走天下还是鞋柜塞满？',
        opts: [
          { t: '只有一双，够穿就行', s: [-0.3, 0, 0, -0.3, -1, 0, 0.5] },
          { t: '2-3双，不同场景换着穿', s: [0, 0, 0, 0.3, 0.3, 0, 0] },
          { t: '4-6双，竞速/训练/越野各有所用', s: [0.2, 0.3, -0.3, 0.3, 0.8, 0.5, -0.3] },
          { t: '已经数不清了，看到好看的就想买', s: [-0.2, -0.3, 0.5, -0.2, 1, 0, 0.3] }
        ]
      },
      {
        mod: '模块四·装备与路线', text: '你选择跑步路线的标准是？', hint: '风景优先还是训练优先？',
        opts: [
          { t: '风景好！公园湖边绿道是我的最爱', s: [-0.3, 0, 0, 0, -0.3, 1, 0.5] },
          { t: '距离和路况合适，适合训练', s: [0.2, 0.5, -0.3, 0.5, 0, 0, 0] },
          { t: '有补给站和洗手间的长距离路线', s: [-0.2, 0.8, 0, 0.3, 0, -0.2, 0] },
          { t: '越野山地路线，越有挑战性越好', s: [-0.2, 0.5, -0.5, 0.2, 0.5, 1, -0.2] }
        ]
      },
      {
        mod: '模块四·装备与路线', text: '你的运动手表最常看的数据是？', hint: '数据控还是佛系跑者？',
        opts: [
          { t: '配速和用时，速度是第一指标', s: [0.8, 0, -0.3, 0.3, 0.3, -0.5, -0.3] },
          { t: '心率和心率区间，科学训练', s: [0, 0.3, -0.5, 0.8, 0.5, -0.3, -0.3] },
          { t: '距离和步数，跑多远才是关键', s: [-0.2, 0.8, 0, 0.3, 0, 0, 0] },
          { t: '不太看数据，跑了就好', s: [-0.7, -0.3, 0.3, -0.8, -0.5, 0.3, 1] }
        ]
      },
      {
        mod: '模块五·心态与目标', text: '你跑步的终极目标是？', hint: '你的终点在哪里？',
        opts: [
          { t: '跑一场全马/超马', s: [-0.2, 1, 0, 0.8, 0.3, 0, -0.3] },
          { t: '不断刷新自己的PB', s: [0.8, 0.3, -0.2, 0.5, 0.3, -0.3, -0.5] },
          { t: '保持健康，享受跑步的乐趣', s: [-0.5, 0, 0, 0, -0.3, 0.5, 0.8] },
          { t: '跑遍世界各地的马拉松赛事', s: [0, 0.5, 0.8, 0.3, 0.5, 0.8, -0.2] }
        ]
      },
      {
        mod: '模块五·心态与目标', text: '跑步遇到"撞墙期"你会？', hint: '坚持还是放慢脚步？',
        opts: [
          { t: '咬牙坚持，撞墙就是突破的前奏', s: [0.3, 0.8, -0.3, 0.8, 0, -0.3, -0.5] },
          { t: '放慢速度，调整呼吸和节奏', s: [-0.2, 0.3, 0, 0.5, 0, 0.3, 0.5] },
          { t: '停下来走一段，不丢人', s: [-0.5, -0.3, 0.3, -0.5, -0.3, 0.3, 1] },
          { t: '看一眼手表数据，分析是不是跑太快了', s: [0.2, 0, -0.5, 0.5, 0.8, -0.3, -0.2] }
        ]
      },
      {
        mod: '模块五·心态与目标', text: '用一个词形容你的跑步哲学：', hint: '最后一题，认真选哦～',
        opts: [
          { t: '"更快、更强、突破极限"', s: [0.8, 0.3, -0.3, 0.5, 0.3, -0.5, -0.8] },
          { t: '"享受过程，每一步都是风景"', s: [-0.5, 0.2, 0, 0, -0.3, 1, 0.8] },
          { t: '"跑步是为了更好地吃喝"', s: [-0.7, -0.3, 0.5, -0.5, -0.3, 0, 1] },
          { t: '"科学训练，数据驱动进步"', s: [0.2, 0.3, -0.5, 0.8, 0.8, -0.5, -0.5] }
        ]
      }
    ];

    // ── LEAF PARTICLE FX ───────────────────────────────────
    const LEAF_EMOJIS = ['🍃', '🌿', '☘️', '🍀', '🌱'];
    function spawnLeaf(el) {
      const rect = el.getBoundingClientRect();
      const cx = rect.left + rect.width / 2;
      const cy = rect.top + rect.height / 2;
      for (let i = 0; i < 3; i++) {
        const d = document.createElement('div');
        d.className = 'leaf';
        d.textContent = LEAF_EMOJIS[Math.floor(Math.random() * LEAF_EMOJIS.length)];
        const dx = (Math.random() - 0.5) * 80;
        const dy = -(20 + Math.random() * 40);
        const rot = (Math.random() - 0.5) * 120;
        d.style.setProperty('--dx', dx + 'px');
        d.style.setProperty('--dy', dy + 'px');
        d.style.setProperty('--rot', rot + 'deg');
        d.style.left = (cx + (Math.random() - 0.5) * 40) + 'px';
        d.style.top = cy + 'px';
        document.body.appendChild(d);
        setTimeout(() => d.remove(), 850);
      }
    }

    // ── AUDIO (Fresh wind chime style) ─────────────────────
    const SFX = (() => {
      let ctx = null, bgT = null;
      const init = () => {
        if (!ctx) ctx = new (window.AudioContext || window.webkitAudioContext)();
        if (ctx.state === 'suspended') ctx.resume();
      };
      const note = (freq, type, dur, vol = 0.08, delay = 0) => {
        if (!ctx) return;
        const o = ctx.createOscillator(), g = ctx.createGain();
        const t = ctx.currentTime + delay;
        o.type = type; o.frequency.setValueAtTime(freq, t);
        g.gain.setValueAtTime(0, t);
        g.gain.linearRampToValueAtTime(vol, t + 0.02);
        g.gain.exponentialRampToValueAtTime(0.001, t + dur);
        o.connect(g).connect(ctx.destination);
        o.start(t); o.stop(t + dur);
      };
      // Soft click - like a gentle tap
      const click = () => {
        note(880, 'sine', 0.06, 0.05);
        note(1320, 'sine', 0.04, 0.03, 0.03);
      };
      // Confirm - gentle ascending chime
      const confirm = () => {
        note(659, 'sine', 0.2, 0.06, 0);
        note(784, 'sine', 0.25, 0.06, 0.1);
        note(988, 'sine', 0.3, 0.04, 0.2);
      };
      // Reveal - fresh morning melody
      const reveal = () => {
        [523, 659, 784, 1047].forEach((f, i) => note(f, 'sine', 0.5, 0.06, i * 0.08));
        note(1319, 'sine', 0.4, 0.03, 0.35);
      };
      // BGM - soft wind chimes + gentle ambient
      const startBGM = () => {
        if (!ctx) return;
        // Soft filtered noise for wind ambience
        const sz = ctx.sampleRate * 3, buf = ctx.createBuffer(1, sz, ctx.sampleRate), d = buf.getChannelData(0);
        for (let i = 0; i < sz; i++) d[i] = Math.random() * 2 - 1;
        const src = ctx.createBufferSource(); src.buffer = buf; src.loop = true;
        const flt = ctx.createBiquadFilter(); flt.type = 'bandpass'; flt.frequency.value = 800; flt.Q.value = 0.5;
        const gn = ctx.createGain(); gn.gain.value = 0.004;
        src.connect(flt).connect(gn).connect(ctx.destination); src.start();
        // Random wind chime notes (pentatonic scale for pleasant sound)
        const CHIME = [523.25, 587.33, 659.25, 783.99, 880, 1046.5, 1174.66];
        const chime = () => {
          if (!ctx) return;
          const f = CHIME[Math.floor(Math.random() * CHIME.length)];
          const t = ctx.currentTime;
          const o = ctx.createOscillator(), g = ctx.createGain();
          o.type = 'sine'; o.frequency.setValueAtTime(f, t);
          g.gain.setValueAtTime(0, t);
          g.gain.linearRampToValueAtTime(0.015, t + 0.01);
          g.gain.exponentialRampToValueAtTime(0.001, t + 2.5);
          o.connect(g).connect(ctx.destination);
          o.start(t); o.stop(t + 2.6);
          // Occasional harmonic
          if (Math.random() > 0.6) {
            const o2 = ctx.createOscillator(), g2 = ctx.createGain();
            o2.type = 'sine'; o2.frequency.setValueAtTime(f * 2, t + 0.05);
            g2.gain.setValueAtTime(0, t + 0.05);
            g2.gain.linearRampToValueAtTime(0.005, t + 0.06);
            g2.gain.exponentialRampToValueAtTime(0.001, t + 1.5);
            o2.connect(g2).connect(ctx.destination);
            o2.start(t + 0.05); o2.stop(t + 1.6);
          }
          bgT = setTimeout(chime, 2500 + Math.random() * 4000);
        };
        bgT = setTimeout(chime, 1000);
      };
      return { init, click, confirm, reveal, startBGM };
    })();

    // ── STATE ──────────────────────────────────────────────
    const LM = ['正在追踪你的跑步轨迹', '正在分析配速基因', '正在扫描耐力指数', '正在鉴定装备党浓度', '正在评估佛系程度'];
    const LF = ['🌿', '👟', '📊', '🏅', '☁️'];
    let questions = [], step = 0, history = [], tmpScore = null, canUndo = false, lTmr = null;

    function show(id) { document.querySelectorAll('.sc').forEach(el => el.classList.toggle('hidden', el.id !== id)); }

    function startQuiz() {
      SFX.init(); SFX.confirm(); SFX.startBGM();
      questions = [...ALL_Q];
      for (let i = questions.length - 1; i > 0; i--) { const j = Math.floor(Math.random() * (i + 1)); [questions[i], questions[j]] = [questions[j], questions[i]]; }
      step = 0; history = []; tmpScore = null; canUndo = false;
      document.getElementById('qT').textContent = questions.length;
      show('sQuiz'); renderQ();
    }

    function renderQ() {
      const q = questions[step], n = step + 1, tot = questions.length, isLast = step === tot - 1;
      document.getElementById('qC').textContent = String(n).padStart(2, '0');
      document.getElementById('qN').textContent = 'Q.' + String(n).padStart(2, '0');
      document.getElementById('qTx').textContent = q.text;
      const hintEl = document.getElementById('qHint');
      hintEl.textContent = q.hint || '';
      hintEl.classList.remove('show');
      setTimeout(() => hintEl.classList.add('show'), 300);
      document.getElementById('qMod').textContent = q.mod;
      document.getElementById('pF').style.width = (n / tot * 100) + '%';
      tmpScore = null;
      const nb = document.getElementById('btnNx');
      nb.disabled = true; nb.className = 'btnNx fQ'; nb.textContent = isLast ? '揭晓结果 →' : '下一题 →';
      const pb = document.getElementById('btnP');
      pb.style.display = (step > 0 && canUndo) ? '' : 'none';
      const c = document.getElementById('opts'); c.innerHTML = '';
      const LBL = ['A', 'B', 'C', 'D'];
      q.opts.forEach((opt, i) => {
        const d = document.createElement('div'); d.className = 'opt';
        d.innerHTML = '<div class="oK fQ">' + LBL[i] + '</div><div class="oT">' + opt.t + '</div>';
        d.onclick = () => {
          SFX.click(); spawnLeaf(d);
          c.querySelectorAll('.opt').forEach(o => o.classList.remove('sel'));
          d.classList.add('sel'); tmpScore = opt.s;
          nb.disabled = false; nb.className = 'btnNx fQ on';
        };
        c.appendChild(d);
        // Staggered entrance animation
        setTimeout(() => d.classList.add('show'), 80 + i * 80);
      });
      c.scrollTop = 0;
    }

    function goNext() {
      if (!tmpScore) return;
      SFX.confirm(); history.push(tmpScore); canUndo = true;
      // Milestone celebration at 25%, 50%, 75%
      const pct = (step + 1) / questions.length;
      const milestones = [
        { at: 0.25, text: '🏃 加油！才刚开始～' },
        { at: 0.5,  text: '🔥 已过半！你超棒的！' },
        { at: 0.75, text: '🌟 快到终点了！冲刺！' }
      ];
      const m = milestones.find(m => Math.abs(pct - m.at) < 0.01);
      if (m) showMilestone(m.text);
      step < questions.length - 1 ? (step++, renderQ()) : runLoad();
    }

    function showMilestone(text) {
      const el = document.createElement('div');
      el.className = 'milestone-flash';
      el.textContent = text;
      document.querySelector('.qBody').appendChild(el);
      setTimeout(() => el.remove(), 900);
    }

    function goBack() {
      if (step > 0 && canUndo) {
        SFX.click(); history.pop(); step--; canUndo = false; renderQ();
      }
    }

    function runLoad() {
      show('sLoad'); let mi = 0;
      const mE = document.getElementById('lM'), fE = document.getElementById('lF');
      const bump = () => {
        mE.style.opacity = '0';
        setTimeout(() => {
          mi = (mi + 1) % LM.length;
          mE.innerHTML = LM[mi] + '<span class="dots"><span>.</span><span>.</span><span>.</span></span>';
          fE.textContent = LF[mi % LF.length];
          mE.style.opacity = '1';
        }, 200);
      };
      lTmr = setInterval(bump, 700);
      setTimeout(() => { clearInterval(lTmr); calcResult(); }, 2800);
    }

    function calcResult() {
      const tot = [0, 0, 0, 0, 0, 0, 0];
      history.forEach(s => s.forEach((v, i) => tot[i] += v));
      const norm = tot.map(v => {
        const clamped = Math.max(-12, Math.min(12, v));
        return clamped / 12;
      });
      let sc = PERSONAS.map(p => {
        let m = 0;
        norm.forEach((v, i) => m += Math.abs(v - p.attributes[i]));
        return { ...p, m };
      });
      sc.sort((a, b) => a.m - b.m);
      const minM = sc[0].m;
      let cands = sc.filter(p => p.m === minM);
      if (cands.length > 1) {
        cands = cands.map(p => {
          let e = 0;
          norm.forEach((v, i) => e += Math.pow(v - p.attributes[i], 2));
          return { ...p, e: Math.sqrt(e) };
        });
        cands.sort((a, b) => a.e - b.e);
      }
      renderResult(cands[0], norm);
      SFX.reveal(); show('sResult');
      document.querySelector('.rScr').scrollTop = 0;
      // Confetti celebration!
      setTimeout(() => burstConfetti(), 400);
    }

    function burstConfetti() {
      const colors = ['#5EBD8E', '#6CB4EE', '#F4A261', '#E88D9D', '#B8A9C9', '#A8C5A0', '#F2C57C'];
      for (let i = 0; i < 30; i++) {
        const el = document.createElement('div');
        el.className = 'confetti';
        el.style.background = colors[Math.floor(Math.random() * colors.length)];
        el.style.left = (window.innerWidth / 2 + (Math.random() - 0.5) * 60) + 'px';
        el.style.top = (window.innerHeight / 2) + 'px';
        const angle = (Math.PI * 2 / 30) * i + Math.random() * 0.3;
        const dist = 80 + Math.random() * 160;
        el.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
        el.style.setProperty('--dy', (Math.sin(angle) * dist - 60) + 'px');
        el.style.setProperty('--rot', (Math.random() * 720 - 360) + 'deg');
        el.style.width = (5 + Math.random() * 6) + 'px';
        el.style.height = (5 + Math.random() * 6) + 'px';
        el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        document.body.appendChild(el);
        setTimeout(() => el.remove(), 1300);
      }
    }

    function renderResult(r, norm) {
      document.getElementById('rH').style.background = 'linear-gradient(180deg, ' + r.color + '15 0%, transparent 100%)';
      document.getElementById('rEm').textContent = r.emoji;
      document.getElementById('rEn').textContent = r.enName;
      document.getElementById('rNm').textContent = r.name;
      document.getElementById('rBf').textContent = r.brief;
      document.getElementById('rDes').textContent = r.desc;

      const tagColors = [
        'linear-gradient(135deg, #5EBD8E, #6CB4EE)',
        'linear-gradient(135deg, #F4A261, #E88D9D)',
        'linear-gradient(135deg, #B8A9C9, #6CB4EE)',
        'linear-gradient(135deg, #A8C5A0, #5EBD8E)',
        'linear-gradient(135deg, #F2C57C, #F4A261)',
        'linear-gradient(135deg, #7EB8DA, #B8A9C9)',
        'linear-gradient(135deg, #E88D9D, #B8A9C9)'
      ];
      document.getElementById('rPk').innerHTML = r.peaks.map((p, i) =>
        '<span class="pTag" style="background:' + tagColors[i % tagColors.length] + '">' + p + '</span>'
      ).join('');

      document.getElementById('rDm').innerHTML = DIM_LABELS.map((lbl, i) => {
        const pct = Math.round((norm[i] + 1) / 2 * 100);
        return '<div class="dRow"><span class="dLbl fQ">' + lbl + '</span><div class="dTrk"><div class="dFil" style="width:0%;background:' + DIM_COLORS[i] + '" data-p="' + pct + '"></div></div><span class="dVal fQ">' + pct + '</span></div>';
      }).join('');

      requestAnimationFrame(() => requestAnimationFrame(() => {
        document.querySelectorAll('.dFil[data-p]').forEach(el => {
          el.style.width = el.getAttribute('data-p') + '%';
        });
      }));
    }

    function resetQuiz() { SFX.confirm(); show('sStart'); }
  </script>
