<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>DPT · 饮酒人格测试</title>
  <meta name="description" content="发现你的隐藏饮酒人格！微醺水彩风趣味测试，15道题解锁你的酒桌人设。">
  <link rel="icon" type="image/png" href="../favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;500;600;700&family=Noto+Serif+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="app">
  <!-- Watercolor Wash Background -->
  <div class="bg-wash bg-wash-1"></div>
  <div class="bg-wash bg-wash-2"></div>
  <div class="bg-wash bg-wash-3"></div>

  <!-- Screen: Start -->
  <div id="sStart" class="sc">
    <div class="start-logo">🍷</div>
    <div class="start-title fC">你是哪种饮酒人格？</div>
    <div class="start-sub">Drinking Personality Test</div>
    <div class="start-info">
      <span class="info-chip">📝 15 题</span>
      <span class="info-chip">⏱ 约 3 分钟</span>
      <span class="info-chip">🎨 微醺水彩风</span>
    </div>
    <button class="btn-start" onclick="startQuiz()">开始测试</button>
  </div>

  <!-- Screen: Quiz -->
  <div id="sQuiz" class="sc hidden">
    <div class="q-header">
      <span class="q-logo fC">DPT</span>
      <span class="q-tag">DRINK</span>
    </div>
    <div class="q-progress">
      <div class="q-progress-bar" id="pBar" style="width:0%"></div>
    </div>
    <div class="q-mod" id="qMod"></div>
    <div class="q-body">
      <div class="q-text" id="qText"></div>
      <div class="q-hint" id="qHint"></div>
      <div class="q-opts" id="qOpts"></div>
    </div>
    <div class="q-nav">
      <button class="btn-q btn-back" id="btnBack" onclick="goBack()" disabled>↩ 回退</button>
      <button class="btn-q btn-next" id="btnNext" onclick="goNext()" disabled>下一题 →</button>
    </div>
  </div>

  <!-- Screen: Loading -->
  <div id="sLoad" class="sc hidden">
    <div class="load-emoji" id="lEmoji">🍷</div>
    <div class="load-text" id="lText">正在分析你的饮酒DNA</div>
  </div>

  <!-- Screen: Result -->
  <div id="sResult" class="sc hidden">
    <div class="rScr">
      <div class="rHero" id="rHero">
        <div class="rBadge">YOUR DRINKING TYPE · 你的饮酒人格</div>
        <div class="rEmoji" id="rEmoji"></div>
        <div class="rEn fC" id="rEn"></div>
        <div class="rNm" id="rNm"></div>
        <div class="rBf" id="rBf"></div>
      </div>
      <div class="rBody">
        <div class="rCard">
          <div class="rCT fC">深度解析 · DEEP ANALYSIS</div>
          <div class="rDes" id="rDes"></div>
        </div>
        <div class="rCard">
          <div class="rCT fC">巅峰属性 · PEAK STATS</div>
          <div class="pTags" id="pTags"></div>
          <div class="dBars" id="dBars"></div>
        </div>
        <button class="btn-retry" onclick="resetQuiz()">🔄 再来一次</button>
      </div>
    </div>
  </div>
</div>

<script src="sfx.js"></script>
<script src="app.js"></script>
</body>
</html>
